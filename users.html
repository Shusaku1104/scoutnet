<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - ユーザープロフィール</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }

        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
            margin-left:15px;
        }

        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }

        .profile-card {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:20px;
            box-shadow:0 4px 0 #D7C4A3;
        }

        .icon {
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
            display:block;
            margin:0 auto 15px;
            background:#ddd;
        }

        .label {
            font-weight:700;
            margin-top:10px;
        }

        .value {
            margin-bottom:10px;
        }
    </style>
</head>
<body>

<nav>
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div>
        <a href="home.html">ホーム</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="container">
    <div class="profile-card">

        <img id="icon" class="icon">

        <div class="label">名前</div>
        <div class="value" id="name"></div>

        <div class="label">所属</div>
        <div class="value" id="team"></div>

        <div class="label">自己紹介</div>
        <div class="value" id="bio"></div>

        <div class="label">投稿数</div>
        <div class="value" id="postCount"></div>

        <div class="label">いいねした投稿</div>
        <div class="value" id="likeCount"></div>

    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
    getFirestore, doc, getDoc, collection, query, where, getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDrvBB4R30sV_AhzzpJY9_d5x0biDp8uyA",
    authDomain: "scoutnet-3ccb1.firebaseapp.com",
    projectId: "scoutnet-3ccb1",
    storageBucket: "scoutnet-3ccb1.appspot.com",
    messagingSenderId: "619869604171",
    appId: "1:619869604171:web:7ba88ab8eb9a0bff0ec0ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(location.search);
const userId = params.get("id");

const userRef = doc(db, "users", userId);
const userSnap = await getDoc(userRef);

const defaultIcon = "https://upload.wikimedia.org/wikipedia/commons/9/99/Sample_User_Icon.png";

if (userSnap.exists()) {
    const u = userSnap.data();

    document.getElementById("icon").src = u.iconURL || defaultIcon;
    document.getElementById("name").textContent = u.name;
    document.getElementById("team").textContent = `${u.prefecture} ${u.troop}`;
    document.getElementById("bio").textContent = u.bio || "（未設定）";

    // 投稿数
    const postsQ = query(collection(db, "posts"), where("createdBy", "==", userId));
    const postsSnap = await getDocs(postsQ);
    document.getElementById("postCount").textContent = postsSnap.size;

    // いいね数
    const likesQ = query(collection(db, "likes"), where("user", "==", userId));
    const likesSnap = await getDocs(likesQ);
    document.getElementById("likeCount").textContent = likesSnap.size;
}
</script>

</body>
</html>
