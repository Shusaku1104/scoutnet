<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - 投稿する</title>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
            color: #4E342E;
        }

        /* ナビバー */
        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:#ffffff;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
        }

        nav a:hover {
            color:#2E7D32;
        }

        /* カード */
        .card {
            background: #FFFFFF;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid #D7C4A3;
            margin: 20px;
            box-shadow: 0 4px 0 #D7C4A3;
        }

        h2 {
            font-weight: 700;
            margin-bottom: 16px;
            color: #2E7D32;
            border-left: 6px solid #66BB6A;
            padding-left: 10px;
        }

        .input {
            width: 100%;
            padding: 12px;
            border: 1px solid #D7C4A3;
            border-radius: 10px;
            font-size: 15px;
            background: #fff;
            margin-bottom: 16px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 3px 0 #1B5E20;
        }

        .preview-img {
            width: 100%;
            border-radius: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<!-- ScoutNet ナビバー -->
<nav>
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div style="display:flex; gap:18px; font-size:15px; font-weight:600;">
        <a href="index.html">ホーム</a>
        <a href="post.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="card">
    <h2>新しい投稿を作成</h2>

    <label>タイトル</label>
    <input type="text" id="title" class="input">

    <label>説明</label>
    <textarea id="description" class="input" rows="4"></textarea>

    <label>カテゴリ</label>
    <select id="category" class="input">
        <option value="indoor">🏠 Indoor</option>
        <option value="outdoor">⛺ Outdoor</option>
    </select>

    <label>画像を選択</label>
    <input type="file" id="imageInput" accept="image/*" class="input">

    <img id="preview" class="preview-img" style="display:none;">

    <button id="submit" class="submit-btn">投稿する</button>
</div>

<script>
    const posts = JSON.parse(localStorage.getItem("posts") || "[]");
    const currentUser = localStorage.getItem("currentUser");

    /* 画像プレビュー */
    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");

    imageInput.addEventListener("change", function() {
        const file = this.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = () => {
            preview.src = reader.result;
            preview.style.display = "block";
        };
        reader.readAsDataURL(file);
    });

    /* 投稿処理 */
    document.getElementById("submit").addEventListener("click", () => {
        const title = document.getElementById("title").value.trim();
        const description = document.getElementById("description").value.trim();
        const category = document.getElementById("category").value;

        if (!title || !description) {
            alert("タイトルと説明は必須です。");
            return;
        }

        const newPost = {
            id: Date.now(),
            title,
            description,
            category,
            author: currentUser,
            images: preview.src ? [preview.src] : [],
            likesUsers: [],
            comments: []
        };

        posts.push(newPost);
        localStorage.setItem("posts", JSON.stringify(posts));

        alert("投稿しました！");
        window.location.href = "index.html";
    });
</script>

</body>
</html>s
