<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - ログイン</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }

        .container {
            max-width:400px;
            margin:60px auto;
            background:white;
            padding:25px;
            border-radius:16px;
            border:2px solid #D7C4A3;
            box-shadow:0 4px 0 #D7C4A3;
        }

        h2 {
            text-align:center;
            margin-bottom:20px;
        }

        input {
            width:100%;
            padding:12px;
            margin-bottom:12px;
            border:1px solid #D7C4A3;
            border-radius:10px;
        }

        .btn {
            width:100%;
            padding:14px;
            background:#2E7D32;
            color:white;
            border:none;
            border-radius:10px;
            font-weight:600;
            cursor:pointer;
            box-shadow:0 3px 0 #1B5E20;
            margin-top:10px;
        }

        .link {
            text-align:center;
            margin-top:15px;
        }

        .link a {
            color:#2E7D32;
            text-decoration:none;
            font-weight:600;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ScoutNet ログイン</h2>

    <input type="text" id="userId" placeholder="ログインID">
    <input type="password" id="password" placeholder="パスワード">

    <button class="btn" id="loginBtn">ログイン</button>

    <div class="link">
        <a href="signup.html">アカウントを作成する</a>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDrvBB4R30sV_AhzzpJY9_d5x0biDp8uyA",
    authDomain: "scoutnet-3ccb1.firebaseapp.com",
    projectId: "scoutnet-3ccb1",
    storageBucket: "scoutnet-3ccb1.appspot.com",
    messagingSenderId: "619869604171",
    appId: "1:619869604171:web:7ba88ab8eb9a0bff0ec0ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("loginBtn").addEventListener("click", async () => {
    const id = document.getElementById("userId").value.trim();
    const pw = document.getElementById("password").value.trim();

    if (!id || !pw) {
        alert("ログインIDとパスワードを入力してください");
        return;
    }

    const ref = doc(db, "users", id);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
        alert("このログインIDは存在しません");
        return;
    }

    const data = snap.data();

    if (data.password !== pw) {
        alert("パスワードが違います");
        return;
    }

    // ログイン成功
    localStorage.setItem("currentUser", id);
    location.href = "home.html";
});
</script>

</body>
</html>
