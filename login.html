<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoutNet - ログイン</title>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 40px;
            text-align: center;
            color: #4E342E;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid #D7C4A3;
            width: 80%;
            max-width: 350px;
            margin: 30px auto;
            box-shadow: 0 4px 0 #D7C4A3;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #D7C4A3;
        }

        button {
            width: 95%;
            padding: 12px;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 3px 0 #1B5E20;
            cursor: pointer;
        }

        h2 {
            color: #2E7D32;
            font-weight: 700;
        }

        h3 {
            color: #2E7D32;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<h2>ScoutNet ログイン</h2>

<!-- ログインフォーム -->
<div class="box">
    <h3>ログイン</h3>
    <form id="loginForm">
        <input id="login-email" type="email" placeholder="メールアドレス" required>
        <input id="login-pass" type="password" placeholder="パスワード" required>
        <button type="submit">ログイン</button>
    </form>
</div>

<!-- 新規登録フォーム -->
<div class="box">
    <h3>新規アカウント作成</h3>
    <form id="registerForm">
        <input id="reg-email" type="email" placeholder="メールアドレス" required>
        <input id="reg-pass" type="password" placeholder="パスワード" required>
        <button type="submit">アカウント作成</button>
    </form>
</div>

<!-- Firebase Auth -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDrvBB4R30sV_AhzzpJY9_d5x0biDp8uyA",
        authDomain: "scoutnet-3ccb1.firebaseapp.com",
        projectId: "scoutnet-3ccb1",
        storageBucket: "scoutnet-3ccb1.firebasestorage.app",
        messagingSenderId: "619869604171",
        appId: "1:619869604171:web:7ba88ab8eb9a0bff0ec0ce"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ★ 自動ログイン（Firebase が管理）
    onAuthStateChanged(auth, (user) => {
        if (user) {
            location.href = "index.html";
        }
    });

    // ★ 新規登録
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("reg-email").value;
        const pass = document.getElementById("reg-pass").value;

        try {
            await createUserWithEmailAndPassword(auth, email, pass);
            alert("アカウントを作成しました！");
        } catch (err) {
            alert("エラー：" + err.message);
        }
    });

    // ★ ログイン
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("login-email").value;
        const pass = document.getElementById("login-pass").value;

        try {
            await signInWithEmailAndPassword(auth, email, pass);
            alert("ログインしました！");
        } catch (err) {
            alert("ログイン失敗：" + err.message);
        }
    });
</script>

</body>
</html>
