<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - ログイン</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Firebase 8系 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }
        .container {
            max-width:400px;
            margin:60px auto;
            background:white;
            padding:25px;
            border-radius:16px;
            border:2px solid #D7C4A3;
            box-shadow:0 4px 0 #D7C4A3;
        }
        h2 {
            text-align:center;
            margin-bottom:20px;
        }
        input {
            width:100%;
            padding:12px;
            margin-bottom:12px;
            border:1px solid #D7C4A3;
            border-radius:10px;
        }
        .btn {
            width:100%;
            padding:14px;
            background:#2E7D32;
            color:white;
            border:none;
            border-radius:10px;
            font-weight:600;
            cursor:pointer;
            box-shadow:0 3px 0 #1B5E20;
            margin-top:10px;
        }
        .link {
            text-align:center;
            margin-top:15px;
        }
        .link a {
            color:#2E7D32;
            text-decoration:none;
            font-weight:600;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ScoutNet ログイン</h2>

    <input type="email" id="email" placeholder="メールアドレス（例: example@gmail.com）">
    <input type="password" id="password" placeholder="パスワード">

    <button class="btn" id="loginBtn">ログイン</button>

    <div class="link">
        <a href="signup.html">メールアドレスで新規登録</a>
    </div>
</div>

<script>
/* Firebase 設定 */
const firebaseConfig = {
  apiKey: "AIzaSyD121KvHW6Dtda16wFLOQ4IGOManS_bPl4",
  authDomain: "scoutnet12.firebaseapp.com",
  projectId: "scoutnet12",
  storageBucket: "scoutnet12.firebasestorage.app",
  messagingSenderId: "572737738511",
  appId: "1:572737738511:web:36a6a477c7ec6b8db7507a"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ログイン処理 */
document.getElementById("loginBtn").onclick = async () => {
    const email = document.getElementById("email").value.trim();
    const pw = document.getElementById("password").value.trim();

    if (!email || !pw) {
        alert("メールアドレスとパスワードを入力してください");
        return;
    }

    try {
        const userCredential = await auth.signInWithEmailAndPassword(email, pw);
        const uid = userCredential.user.uid;

        const snap = await db.collection("users").doc(uid).get();
        if (!snap.exists) {
            alert("ユーザーデータが存在しません");
            return;
        }

        localStorage.setItem("currentUser", uid);
        location.href = "home.html";

    } catch (error) {
        alert("ログインエラー：" + error.message);
    }
};
</script>

</body>
</html>
