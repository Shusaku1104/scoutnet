<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - ログイン</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Firebase 8系 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }
        .container {
            max-width:400px;
            margin:60px auto;
            background:white;
            padding:25px;
            border-radius:16px;
            border:2px solid #D7C4A3;
            box-shadow:0 4px 0 #D7C4A3;
        }
        h2 {
            text-align:center;
            margin-bottom:20px;
        }
        input {
            width:100%;
            padding:12px;
            margin-bottom:12px;
            border:1px solid #D7C4A3;
            border-radius:10px;
        }
        .btn {
            width:100%;
            padding:14px;
            background:#2E7D32;
            color:white;
            border:none;
            border-radius:10px;
            font-weight:600;
            cursor:pointer;
            box-shadow:0 3px 0 #1B5E20;
            margin-top:10px;
        }
        .link {
            text-align:center;
            margin-top:15px;
        }
        .link a {
            color:#2E7D32;
            text-decoration:none;
            font-weight:600;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ScoutNet ログイン</h2>

    <input type="text" id="userId" placeholder="ログインID">
    <input type="password" id="password" placeholder="パスワード">

    <button class="btn" id="loginBtn">ログイン</button>

    <div class="link">
        <a href="signup.html">新規登録はこちら</a>
    </div>
</div>

<script>
/* Firebase 設定（ScoutNet12 の値に差し替え） */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "scoutnet12.firebaseapp.com",
  projectId: "scoutnet12",
  storageBucket: "scoutnet12.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ログイン処理 */
document.getElementById("loginBtn").onclick = async () => {
    const id = document.getElementById("userId").value.trim();
    const pw = document.getElementById("password").value.trim();

    if (!id || !pw) {
        alert("ログインIDとパスワードを入力してください");
        return;
    }

    const ref = db.collection("users").doc(id);
    const snap = await ref.get();

    if (!snap.exists) {
        alert("このログインIDは登録されていません");
        return;
    }

    const data = snap.data();

    if (data.password !== pw) {
        alert("パスワードが違います");
        return;
    }

    localStorage.setItem("currentUser", id);
    alert("ログイン成功！");
    location.href = "home.html";
};
</script>

</body>
</html>
