<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoutNet - ログイン</title>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 40px;
            text-align: center;
            color: #4E342E;
        }

        .login-box {
            background: white;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid #D7C4A3;
            width: 80%;
            max-width: 350px;
            margin: auto;
            box-shadow: 0 4px 0 #D7C4A3;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #D7C4A3;
        }

        button {
            width: 95%;
            padding: 12px;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 3px 0 #1B5E20;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>ScoutNet ログイン</h2>

    <div class="login-box">
        <form action="home.html">
            <input type="text" placeholder="ユーザー名" required>
            <input type="password" placeholder="パスワード" required>
            <button type="submit">ログイン</button>
        </form>
    </div>

</body>
</html>
