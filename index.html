<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoutNet - ホーム</title>

    <style>
        /* ベースフォント（端末幅で自動調整） */
        html {
            font-size: clamp(14px, 2.5vw, 18px);
        }

        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
            color: #4E342E;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #ffffff;
            border-bottom: 2px solid #D7C4A3;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            color: #4E342E;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .card {
            background: #FFFFFF;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid #D7C4A3;
            margin: 20px;
            box-shadow: 0 4px 0 #D7C4A3;
        }

        .post {
            background: white;
            border: 1px solid #D7C4A3;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 16px;
            box-shadow: 0 3px 0 #D7C4A3;
            cursor: pointer;
        }

        .post img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .likeBtn {
            font-size: 1.1rem;
            cursor: pointer;
            display: inline-block;
            margin-top: 8px;
        }

        /* スマホ向け最適化 */
        @media (max-width: 480px) {
            nav div:first-child {
                font-size: 1.2rem;
            }

            nav a {
                font-size: 0.8rem;
            }

            .card {
                margin: 12px;
                padding: 16px;
            }

            .post {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<nav>
    <div style="font-size:1.3rem; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div style="display:flex; gap:18px; font-weight:600;">
        <a href="index.html">ホーム</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="card">
    <h2 style="font-size:1.4rem;">新着投稿</h2>
    <div id="postList"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>
// 🔥 GitHub に公開しても安全なダミー設定
const firebaseConfig = {
    apiKey: "YOUR_FIREBASE_API_KEY",
    authDomain: "scoutnet-3ccb1.firebaseapp.com",
    projectId: "scoutnet-3ccb1",
    storageBucket: "scoutnet-3ccb1.firebasestorage.app",
    messagingSenderId: "619869604171",
    appId: "1:619869604171:web:7ba88ab8eb9a0bff0ec0ce"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser = null;

// 🔥 Firebase Auth でログインチェック
auth.onAuthStateChanged(user => {
    if (!user) {
        location.href = "login.html";
        return;
    }
    currentUser = user;
});

const postList = document.getElementById("postList");

/* -------------------------
   通知送信関数
------------------------- */
async function sendNotification(toUserId, type, postId) {
    await db.collection("notifications").add({
        userId: toUserId,
        type: type,
        postId: postId,
        fromUserId: currentUser.uid,
        fromUserName: currentUser.email,
        createdAt: new Date()
    });
}

/* -------------------------
   いいね処理
------------------------- */
async function toggleLike(postId, postOwnerId) {
    const ref = db.collection("posts").doc(postId);
    const snap = await ref.get();
    const post = snap.data();

    let likes = post.likes || [];

    if (likes.includes(currentUser.uid)) {
        likes = likes.filter(id => id !== currentUser.uid);
    } else {
        likes.push(currentUser.uid);

        if (postOwnerId !== currentUser.uid) {
            sendNotification(postOwnerId, "like", postId);
        }
    }

    await ref.update({ likes });
}

/* -------------------------
   Firestore から投稿を読み込む
------------------------- */
db.collection("posts")
  .orderBy("createdAt", "desc")
  .onSnapshot((snapshot) => {
      postList.innerHTML = "";

      if (snapshot.empty) {
          postList.innerHTML = "<p>まだ投稿がありません。</p>";
          return;
      }

      snapshot.forEach((doc) => {
          const post = doc.data();

          const div = document.createElement("div");
          div.className = "post";

          if (post.images && post.images.length > 0) {
              const img = document.createElement("img");
              img.src = post.images[0];
              div.appendChild(img);
          }

          div.innerHTML += `
              <h3 style="font-size:1.2rem;">${post.title}</h3>
              <p>${post.description}</p>
          `;

          const likeBtn = document.createElement("span");
          likeBtn.className = "likeBtn";

          const likes = post.likes || [];
          likeBtn.innerHTML = `❤️ ${likes.length}`;

          likeBtn.addEventListener("click", (e) => {
              e.stopPropagation();
              toggleLike(doc.id, post.userId);
          });

          div.appendChild(likeBtn);

          div.addEventListener("click", () => {
              location.href = "post.html?id=" + doc.id;
          });

          postList.appendChild(div);
      });
  });
</script>

</body>
</html>
