    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>

<script>
// Firebase 設定（ScoutNet12）
const firebaseConfig = {
  apiKey: "AIzaSyD121KvHW6Dtda16wFLOQ4IGOManS_bPl4",
  authDomain: "scoutnet12.firebaseapp.com",
  projectId: "scoutnet12",
  storageBucket: "scoutnet12.firebasestorage.app",
  messagingSenderId: "572737738511",
  appId: "1:572737738511:web:36a6a477c7ec6b8db7507a"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Firebase Auth でログイン判定
auth.onAuthStateChanged(user => {
    if (user) {
        // ログイン済み → ホームへ
        location.href = "home.html";
    } else {
        // 未ログイン → ログインページへ
        location.href = "login.html";
    }
});
</script>
