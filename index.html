<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoutNet - ホーム</title>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
            color: #4E342E;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #ffffff;
            border-bottom: 2px solid #D7C4A3;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            color: #4E342E;
            text-decoration: none;
            font-weight: 600;
        }

        .card {
            background: #FFFFFF;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid #D7C4A3;
            margin: 20px;
            box-shadow: 0 4px 0 #D7C4A3;
        }

        .post {
            background: white;
            border: 1px solid #D7C4A3;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 16px;
            box-shadow: 0 3px 0 #D7C4A3;
            cursor: pointer;
        }

        .post img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .likeBtn {
            font-size: 18px;
            cursor: pointer;
            display: inline-block;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<script>
// ログインしてなければログインページへ
if (!localStorage.getItem("currentUser")) {
    location.href = "login.html";
}
</script>

<nav>
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div style="display:flex; gap:18px; font-size:15px; font-weight:600;">
        <a href="index.html">ホーム</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="card">
    <h2>新着投稿</h2>
    <div id="postList"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDrvBB4R30sV_AhzzpJY9_d5x0biDp8uyA",
    authDomain: "scoutnet-3ccb1.firebaseapp.com",
    projectId: "scoutnet-3ccb1",
    storageBucket: "scoutnet-3ccb1.firebasestorage.app",
    messagingSenderId: "619869604171",
    appId: "1:619869604171:web:7ba88ab8eb9a0bff0ec0ce"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const postList = document.getElementById("postList");
const currentUser = JSON.parse(localStorage.getItem("currentUser"));

/* -------------------------
   通知送信関数
------------------------- */
async function sendNotification(toUserId, type, postId) {
    await db.collection("notifications").add({
        userId: toUserId,
        type: type,
        postId: postId,
        fromUserId: currentUser.id,
        fromUserName: currentUser.name,
        createdAt: new Date()
    });
}

/* -------------------------
   いいね処理
------------------------- */
async function toggleLike(postId, postOwnerId) {
    const ref = db.collection("posts").doc(postId);
    const snap = await ref.get();
    const post = snap.data();

    let likes = post.likes || [];

    if (likes.includes(currentUser.id)) {
        // いいね解除
        likes = likes.filter(id => id !== currentUser.id);
    } else {
        // いいね追加
        likes.push(currentUser.id);

        // 通知（自分の投稿じゃないときだけ）
        if (postOwnerId !== currentUser.id) {
            sendNotification(postOwnerId, "like", postId);
        }
    }

    await ref.update({ likes });
}

/* -------------------------
   Firestore から投稿を読み込む
------------------------- */
db.collection("posts")
  .orderBy("createdAt", "desc")
  .onSnapshot((snapshot) => {
      postList.innerHTML = "";

      if (snapshot.empty) {
          postList.innerHTML = "<p>まだ投稿がありません。</p>";
          return;
      }

      snapshot.forEach((doc) => {
          const post = doc.data();

          const div = document.createElement("div");
          div.className = "post";

          // 画像
          if (post.images && post.images.length > 0) {
              const img = document.createElement("img");
              img.src = post.images[0];
              div.appendChild(img);
          }

          // タイトル・説明
          div.innerHTML += `
              <h3>${post.title}</h3>
              <p>${post.description}</p>
          `;

          // いいねボタン
          const likeBtn = document.createElement("span");
          likeBtn.className = "likeBtn";

          const likes = post.likes || [];
          likeBtn.innerHTML = `❤️ ${likes.length}`;

          likeBtn.addEventListener("click", (e) => {
              e.stopPropagation(); // 投稿クリックを防ぐ
              toggleLike(doc.id, post.userId);
          });

          div.appendChild(likeBtn);

          // 投稿クリックで詳細へ
          div.addEventListener("click", () => {
              location.href = "post.html?id=" + doc.id;
          });

          postList.appendChild(div);
      });
  });
</script>

</body>
</html>
