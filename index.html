<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - ログイン</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            text-align:center;
            color:#4E342E;
        }

        .box {
            margin-top:80px;
            background:white;
            display:inline-block;
            padding:30px;
            border-radius:16px;
            border:2px solid #D7C4A3;
            box-shadow:0 4px 0 #D7C4A3;
        }

        input {
            width:250px;
            padding:10px;
            margin:10px 0;
            border-radius:8px;
            border:1px solid #aaa;
        }

        button {
            width:270px;
            padding:12px;
            background:#2E7D32;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
        }

        a {
            display:block;
            margin-top:15px;
            color:#2E7D32;
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>ScoutNet ログイン</h2>

    <input id="email" type="email" placeholder="メールアドレス"><br>
    <input id="password" type="password" placeholder="パスワード"><br>

    <button id="loginBtn">ログイン</button>
    <a href="register.html">新規登録はこちら</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyDrvBB4R30sV_AhzzpJY9_d5x0biDp8uyA",
    authDomain: "scoutnet-3ccb1.firebaseapp.com",
    projectId: "scoutnet-3ccb1",
    storageBucket: "scoutnet-3ccb1.firebasestorage.app",
    messagingSenderId: "619869604171",
    appId: "1:619869604171:web:7ba88ab8eb9a0bff0ec0ce"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginBtn").addEventListener("click", () => {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, pass)
        .then(() => {
            localStorage.setItem("currentUser", email);
            location.href = "home.html";
        })
        .catch((err) => {
            alert("ログイン失敗: " + err.message);
        });
});
</script>

</body>
</html>
