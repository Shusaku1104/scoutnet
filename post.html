<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - 投稿詳細</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Firebase 8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0 0 80px;
            color:#4E342E;
        }

        /* 上ナビバー */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 200;
            background: white;
            padding: 14px 18px;
            border-bottom: 2px solid #D7C4A3;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .top-nav img { height: 28px; }
        .top-nav-title {
            font-size: 20px;
            font-weight: 700;
        }

        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }

        .post-card {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:16px;
            box-shadow:0 4px 0 #D7C4A3;
            position:relative;
        }

        /* 投稿者情報 */
        .author-box {
            display:flex;
            align-items:center;
            gap:12px;
            margin-bottom:15px;
            cursor:pointer;
        }
        .author-icon {
            width:48px;
            height:48px;
            border-radius:50%;
            object-fit:cover;
            background:#ddd;
            border:2px solid #D7C4A3;
        }
        .author-name {
            font-size:18px;
            font-weight:700;
            color:#2E7D32;
        }
        .author-meta {
            font-size:13px;
            color:#777;
        }

        /* 編集・削除ボタン */
        .post-actions {
            position:absolute;
            top:10px;
            right:10px;
            display:flex;
            gap:12px;
        }
        .edit-icon, .delete-icon {
            font-size:22px;
            cursor:pointer;
            opacity:0.85;
            transition:0.1s;
        }
        .edit-icon:active, .delete-icon:active {
            transform:scale(0.85);
            opacity:0.5;
        }

        /* スライダー */
        .slider {
            position: relative;
            width: 100%;
            height: 260px;
            margin-bottom: 15px;
            overflow: hidden;
            border-radius: 12px;
            background: #ddd;
        }
        .slide-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .slide-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.7);
            border: none;
            padding: 10px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 50%;
            transition:0.1s;
        }
        .slide-btn:active {
            transform: translateY(-50%) scale(0.9);
        }
        #prevBtn { left: 10px; }
        #nextBtn { right: 10px; }

        .title {
            font-size:22px;
            font-weight:700;
            margin-bottom:6px;
        }
        .category-label {
            font-size:13px;
            color:#2E7D32;
            margin-bottom:10px;
        }
        .desc {
            font-size:16px;
            margin-bottom:15px;
        }

        .file {
            margin-bottom:8px;
            font-size:16px;
        }
        .file a {
            color:#2E7D32;
            text-decoration:none;
            font-weight:600;
        }

        .meta {
            margin-top:15px;
            font-size:14px;
            color:#555;
        }

        .like-btn {
            font-size:26px;
            cursor:pointer;
            user-select:none;
            margin-top:10px;
            transition:0.1s;
        }
        .like-btn:active {
            transform: scale(0.8);
        }
        .like-count {
            font-size:15px;
            margin-left:8px;
            color:#555;
        }

        .comment {
            background:#fafafa;
            border:1px solid #D7C4A3;
            padding:10px;
            border-radius:10px;
            margin-bottom:10px;
        }
        .comment-user {
            font-weight:700;
            margin-bottom:4px;
            color:#2E7D32;
            cursor:pointer;
        }
        .comment-text {
            font-size:14px;
        }

        .comment-input {
            width:100%;
            padding:12px;
            border:1px solid #D7C4A3;
            border-radius:10px;
            margin-top:10px;
        }
        .btn {
            width:100%;
            padding:14px;
            background:#2E7D32;
            color:white;
            border:none;
            border-radius:10px;
            font-weight:600;
            cursor:pointer;
            box-shadow:0 3px 0 #1B5E20;
            margin-top:10px;
            transition:0.1s;
        }
        .btn:active {
            transform: scale(0.97);
        }

        /* 下タブ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: white;
            border-top: 2px solid #D7C4A3;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -3px 0 #D7C4A3;
            z-index: 999;
        }
        .bottom-nav a {
            text-decoration: none;
            color: #4E342E;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }
        .bottom-nav img {
            width: 26px;
            height: 26px;
        }
    </style>
</head>

<body>

<!-- 上ナビバー -->
<div class="top-nav">
    <img src="icons/logo.png">
    <div class="top-nav-title">ScoutNet</div>
</div>

<div class="container">
    <div class="post-card">

        <!-- 投稿者情報 -->
        <div class="author-box" id="authorBox">
            <img id="authorIcon" class="author-icon">
            <div>
                <div id="authorName" class="author-name"></div>
                <div id="authorMeta" class="author-meta"></div>
            </div>
        </div>

        <!-- 編集・削除ボタン -->
        <div class="post-actions" id="postActions" style="display:none;">
            <span class="edit-icon" id="editBtn">✏️</span>
            <span class="delete-icon" id="deleteBtn">🗑️</span>
        </div>

        <!-- スライダー -->
        <div class="slider" id="slider">
            <button class="slide-btn" id="prevBtn">←</button>
            <img id="slideImage" class="slide-img">
            <button class="slide-btn" id="nextBtn">→</button>
        </div>

        <div class="title" id="title"></div>
        <div class="category-label" id="categoryLabel"></div>
        <div class="desc" id="desc"></div>

        <h3>📎 添付ファイル</h3>
        <div id="files"></div>

        <p class="meta">
            投稿日時：<span id="date"></span>
        </p>

        <div>
            <span id="likeBtn" class="like-btn">🤍</span>
            <span id="likeCount" class="like-count">0件</span>
        </div>

        <h3>💬 コメント</h3>
        <div id="comments"></div>

        <textarea id="commentInput" class="comment-input" placeholder="コメントを書く…"></textarea>
        <button class="btn" id="sendComment">コメントを送信</button>

    </div>
</div>

<!-- 下タブ -->
<div class="bottom-nav">
    <a href="home.html">
        <img src="icons/home.png"><br>ホーム
    </a>
    <a href="newpost.html">
        <img src="icons/add.png"><br>投稿
    </a>
    <a href="profile.html">
        <img src="icons/user.png"><br>プロフィール
    </a>
</div>
<script>
/* ポップアップ（共通） */
function showPopup(message) {
    const msg = document.createElement("div");
    msg.style.position = "fixed";
    msg.style.top = "50%";
    msg.style.left = "50%";
    msg.style.transform = "translate(-50%, -50%)";
    msg.style.background = "white";
    msg.style.padding = "20px 30px";
    msg.style.borderRadius = "12px";
    msg.style.boxShadow = "0 4px 10px rgba(0,0,0,0.2)";
    msg.style.fontSize = "20px";
    msg.style.fontWeight = "700";
    msg.style.color = "#2E7D32";
    msg.style.zIndex = "9999";
    msg.innerText = message;

    document.body.appendChild(msg);
    setTimeout(() => msg.remove(), 1500);
}

/* Firebase 設定 */
const firebaseConfig = {
  apiKey: "AIzaSyD121KvHW6Dtda16wFLOQ4IGOManS_bPl4",
  authDomain: "scoutnet12.firebaseapp.com",
  projectId: "scoutnet12",
  storageBucket: "scoutnet12.firebasestorage.app",
  messagingSenderId: "572737738511",
  appId: "1:572737738511:web:36a6a477c7ec6b8db7507a"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

/* 投稿ID取得 */
const params = new URLSearchParams(location.search);
const postId = params.get("id");
const postRef = db.collection("posts").doc(postId);

let currentUser = null;
let currentUserRole = "user";
let postData = null;
let likeRef = null;

/* ログイン確認 */
auth.onAuthStateChanged(async (user) => {
    if (!user) {
        location.href = "login.html";
        return;
    }

    currentUser = user.uid;
    likeRef = postRef.collection("likes").doc(currentUser);

    /* ログインユーザーの role を取得 */
    const userSnap = await db.collection("users").doc(currentUser).get();
    if (userSnap.exists) {
        currentUserRole = userSnap.data().role || "user";
    }

    /* いいね状態の監視 */
    likeRef.onSnapshot((snap) => {
        document.getElementById("likeBtn").textContent = snap.exists ? "❤️" : "🤍";
    });
});

/* 投稿読み込み */
postRef.get().then(async (snap) => {
    if (!snap.exists) {
        showPopup("投稿が見つかりません");
        setTimeout(() => location.href = "home.html", 1500);
        return;
    }

    const post = snap.data();
    postData = post;

    document.getElementById("title").textContent = post.title || "(タイトルなし)";
    document.getElementById("desc").textContent = post.description || "";
    document.getElementById("categoryLabel").textContent = `カテゴリ：${post.category}`;

    /* 日付処理 */
    let createdAt = "日時不明";
    if (post.createdAt?.toMillis) {
        createdAt = new Date(post.createdAt.toMillis()).toLocaleString();
    }
    document.getElementById("date").textContent = createdAt;

    /* 投稿者情報 */
    const userSnap = await db.collection("users").doc(post.createdBy).get();
    const authorNameEl = document.getElementById("authorName");
    const authorIconEl = document.getElementById("authorIcon");
    const authorMetaEl = document.getElementById("authorMeta");
    const authorBox = document.getElementById("authorBox");

    if (userSnap.exists) {
        const u = userSnap.data();
        authorNameEl.textContent = u.name || "不明なユーザー";
        authorIconEl.src = u.iconUrl || "icons/user.png";
        authorMetaEl.textContent = `${u.pref || ""} ${u.group || ""}`;

        authorBox.onclick = () => {
            location.href = `profile.html?uid=${post.createdBy}`;
        };
    } else {
        authorNameEl.textContent = "不明なユーザー";
    }

    /* 添付ファイル */
    const filesDiv = document.getElementById("files");
    (post.files || []).forEach(url => {
        const fileName = decodeURIComponent(url.split("/").pop().split("?")[0]);
        const div = document.createElement("div");
        div.className = "file";

        const a = document.createElement("a");
        a.href = url;
        a.target = "_blank";
        a.textContent = fileName;

        div.appendChild(document.createTextNode("📄 "));
        div.appendChild(a);
        filesDiv.appendChild(div);
    });

    /* 編集・削除ボタン */
    if (post.createdBy === currentUser || currentUserRole === "admin") {
        document.getElementById("postActions").style.display = "flex";

        document.getElementById("editBtn").onclick = () => {
            location.href = `editpost.html?id=${postId}`;
        };

        document.getElementById("deleteBtn").onclick = deletePost;
    }

    /* 画像スライダー（thumbs 優先） */
    const slideImage = document.getElementById("slideImage");
    let images = [];

    if (post.thumbs && post.thumbs.length > 0) {
        images = post.thumbs;
    } else if (post.images && post.images.length > 0) {
        images = post.images;
    }

    let currentIndex = 0;

    function updateSlide() {
        const slider = document.getElementById("slider");

        if (images.length > 0) {
            slideImage.src = images[currentIndex];
            slider.style.display = "block";
        } else {
            slider.style.display = "none";
        }
    }

    document.getElementById("prevBtn").onclick = () => {
        if (images.length === 0) return;
        currentIndex = (currentIndex - 1 + images.length) % images.length;
        updateSlide();
    };

    document.getElementById("nextBtn").onclick = () => {
        if (images.length === 0) return;
        currentIndex = (currentIndex + 1) % images.length;
        updateSlide();
    };

    updateSlide();
});

/* ❤️ いいね数リアルタイム */
postRef.collection("likes").onSnapshot((snapshot) => {
    document.getElementById("likeCount").textContent = snapshot.size + "件";
});

/* ❤️ いいね押したとき */
document.getElementById("likeBtn").onclick = async () => {
    if (!likeRef) return;

    const snap = await likeRef.get();

    if (snap.exists) {
        await likeRef.delete();
    } else {
        await likeRef.set({
            user: currentUser,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        if (postData.createdBy !== currentUser) {
            await db.collection("notifications").add({
                to: postData.createdBy,
                from: currentUser,
                type: "like",
                postId,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
    }
};

/* 💬 コメント読み込み（リアルタイム） */
postRef.collection("comments")
    .orderBy("createdAt", "asc")
    .onSnapshot(async (snapshot) => {

        const commentsDiv = document.getElementById("comments");
        commentsDiv.innerHTML = "";

        const userIds = [...new Set(snapshot.docs.map(doc => doc.data().user))];

        const userSnaps = await Promise.all(
            userIds.map(uid => db.collection("users").doc(uid).get())
        );

        const userMap = {};
        userSnaps.forEach((snap, i) => {
            userMap[userIds[i]] = snap.exists ? snap.data() : null;
        });

        snapshot.docs.forEach(docSnap => {
            const c = docSnap.data();
            const userData = userMap[c.user];

            const commentBox = document.createElement("div");
            commentBox.className = "comment";

            const userDiv = document.createElement("div");
            userDiv.className = "comment-user";

            if (userData) {
                userDiv.textContent = userData.name;
                userDiv.onclick = () => {
                    location.href = `profile.html?uid=${c.user}`;
                };
            } else {
                userDiv.textContent = "不明なユーザー";
            }

            const textDiv = document.createElement("div");
            textDiv.className = "comment-text";
            textDiv.textContent = c.text;

            commentBox.appendChild(userDiv);
            commentBox.appendChild(textDiv);

            commentsDiv.appendChild(commentBox);
        });
    });

/* 💬 コメント送信 */
document.getElementById("sendComment").onclick = async () => {
    const text = document.getElementById("commentInput").value.trim();
    if (!text || !currentUser) return;

    document.getElementById("sendComment").textContent = "送信中…";
    document.getElementById("sendComment").disabled = true;

    await postRef.collection("comments").add({
        text,
        user: currentUser,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    document.getElementById("commentInput").value = "";
    document.getElementById("sendComment").textContent = "コメントを送信";
    document.getElementById("sendComment").disabled = false;

    showPopup("コメントを送信しました！");

    if (postData.createdBy !== currentUser) {
        await db.collection("notifications").add({
            to: postData.createdBy,
            from: currentUser,
            type: "comment",
            postId,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
    }
};

/* 🗑 投稿削除（完全版） */
async function deletePost() {
    if (!confirm("本当に削除しますか？")) return;

    /* 画像削除 */
    if (postData.images) {
        for (let url of postData.images) {
            try {
                const path = decodeURIComponent(url.split("/o/")[1].split("?")[0]);
                await storage.ref(path).delete();
            } catch (e) {}
        }
    }

    /* サムネイル削除 */
    if (postData.thumbs) {
        for (let url of postData.thumbs) {
            try {
                const path = decodeURIComponent(url.split("/o/")[1].split("?")[0]);
                await storage.ref(path).delete();
            } catch (e) {}
        }
    }

    /* ファイル削除 */
    if (postData.files) {
        for (let url of postData.files) {
            try {
                const path = decodeURIComponent(url.split("/o/")[1].split("?")[0]);
                await storage.ref(path).delete();
            } catch (e) {}
        }
    }

    /* likes 削除 */
    const likes = await postRef.collection("likes").get();
    for (const d of likes.docs) await d.ref.delete();

    /* comments 削除 */
    const comments = await postRef.collection("comments").get();
    for (const d of comments.docs) await d.ref.delete();

    /* 通知削除 */
    const noti = await db.collection("notifications")
        .where("postId", "==", postId)
        .get();

    for (const d of noti.docs) await d.ref.delete();

    /* 投稿本体削除 */
    await postRef.delete();

    showPopup("投稿を削除しました！");

    setTimeout(() => {
        location.href = "home.html";
    }, 1500);
}
</script>
