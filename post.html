<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - 投稿詳細</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }

        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
            margin-left:15px;
        }

        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }

        .post-card {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:16px;
            box-shadow:0 4px 0 #D7C4A3;
        }

        .slider {
            position:relative;
            width:100%;
            overflow:hidden;
            border-radius:12px;
            margin-bottom:15px;
        }

        .slides {
            display:flex;
            transition:0.4s;
        }

        .slides img {
            width:100%;
            border-radius:12px;
        }

        .dots {
            text-align:center;
            margin-top:8px;
        }

        .dot {
            height:10px;
            width:10px;
            margin:0 4px;
            background:#D7C4A3;
            border-radius:50%;
            display:inline-block;
        }

        .dot.active {
            background:#2E7D32;
        }

        .title {
            font-size:22px;
            font-weight:700;
            margin-bottom:10px;
        }

        .desc {
            font-size:16px;
            margin-bottom:15px;
        }

        .file {
            margin-bottom:8px;
            font-size:16px;
        }

        .file a {
            color:#2E7D32;
            text-decoration:none;
            font-weight:600;
        }

        .comment {
            background:#fafafa;
            border:1px solid #D7C4A3;
            padding:10px;
            border-radius:10px;
            margin-bottom:10px;
        }

        .comment-user {
            font-weight:600;
            margin-bottom:4px;
        }

        .comment-input {
            width:100%;
            padding:12px;
            border:1px solid #D7C4A3;
            border-radius:10px;
            margin-top:10px;
        }

        .btn {
            width:100%;
            padding:14px;
            background:#2E7D32;
            color:white;
            border:none;
            border-radius:10px;
            font-weight:600;
            cursor:pointer;
            box-shadow:0 3px 0 #1B5E20;
            margin-top:10px;
        }

        @media (max-width:480px) {
            .title { font-size:20px; }
            .desc { font-size:15px; }
            .file { font-size:15px; }
        }
    </style>
</head>
<body>

<nav>
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div>
        <a href="home.html">ホーム</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="container">
    <div class="post-card">

        <div class="slider" id="slider" style="display:none;">
            <div class="slides" id="slides"></div>
            <div class="dots" id="dots"></div>
        </div>

        <div class="title" id="title"></div>
        <div class="desc" id="desc"></div>

        <h3>📎 添付ファイル</h3>
        <div id="files"></div>

        <p style="margin-top:15px; font-size:14px; color:#555;">
            投稿者：<span id="author"></span><br>
            投稿日時：<span id="date"></span>
        </p>

        <h3>💬 コメント</h3>
        <div id="comments"></div>

        <textarea id="commentInput" class="comment-input" placeholder="コメントを書く…"></textarea>
        <button class="btn" id="sendComment">コメントを送信</button>

    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDrvBB4R30sV_AhzzpJY9_d5x0biDp8uyA",
    authDomain: "scoutnet-3ccb1.firebaseapp.com",
    projectId: "scoutnet-3ccb1",
    storageBucket: "scoutnet-3ccb1.appspot.com",
    messagingSenderId: "619869604171",
    appId: "1:619869604171:web:7ba88ab8eb9a0bff0ec0ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const currentUser = localStorage.getItem("currentUser");
if (!currentUser) location.href = "login.html";

const params = new URLSearchParams(location.search);
const postId = params.get("id");

const postRef = doc(db, "posts", postId);
const postSnap = await getDoc(postRef);

let postData = null;

if (postSnap.exists()) {
    const post = postSnap.data();
    postData = post;

    document.getElementById("title").textContent = post.title;
    document.getElementById("desc").textContent = post.description;
    document.getElementById("date").textContent = new Date(post.createdAt).toLocaleString();

    const userRef = doc(db, "users", post.createdBy);
    const userSnap = await getDoc(userRef);
    document.getElementById("author").textContent = userSnap.exists() ? userSnap.data().name : post.createdBy;

    if (post.images && post.images.length > 0) {
        const slider = document.getElementById("slider");
        const slides = document.getElementById("slides");
        const dots = document.getElementById("dots");

        slider.style.display = "block";

        post.images.forEach((url, i) => {
            const img = document.createElement("img");
            img.src = url;
            slides.appendChild(img);

            const dot = document.createElement("span");
            dot.className = "dot" + (i === 0 ? " active" : "");
            dots.appendChild(dot);
        });
    }

    const filesDiv = document.getElementById("files");
    if (post.files) {
        post.files.forEach(url => {
            const fileName = decodeURIComponent(url.split("/").pop().split("?")[0]);
            filesDiv.innerHTML += `
                <div class="file">📄 <a href="${url}" target="_blank">${fileName}</a></div>
            `;
        });
    }
}

// コメント読み込み
const commentsRef = collection(db, "posts", postId, "comments");
const q = query(commentsRef, orderBy("createdAt", "asc"));

onSnapshot(q, (snapshot) => {
    const commentsDiv = document.getElementById("comments");
    commentsDiv.innerHTML = "";

    snapshot.forEach((docSnap) => {
        const c = docSnap.data();
        commentsDiv.innerHTML += `
            <div class="comment">
                <div class="comment-user">${c.user}</div>
                <div>${c.text}</div>
            </div>
        `;
    });
});

// コメント送信＋通知
document.getElementById("sendComment").addEventListener("click", async () => {
    const text = document.getElementById("commentInput").value.trim();
    if (!text) return;

    await addDoc(commentsRef, {
        text,
        user: currentUser,
        createdAt: Date.now()
    });

    document.getElementById("commentInput").value = "";

    // 投稿者に通知（自分の投稿に自分でコメントした場合はスキップしてもいい）
    if (postData && postData.createdBy && postData.createdBy !== currentUser) {
        await addDoc(collection(db, "notifications"), {
            to: postData.createdBy,
            from: currentUser,
            type: "comment",
            postId,
            createdAt: Date.now()
        });
    }
});
</script>

</body>
</html>
