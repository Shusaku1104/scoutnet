<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - 投稿詳細</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Firebase 8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }

        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
            overflow-x:auto;
            white-space:nowrap;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
            margin-left:15px;
        }

        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }

        .post-card {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:16px;
            box-shadow:0 4px 0 #D7C4A3;
        }

        /* スライダー */
        .slider {
            position: relative;
            width: 100%;
            height: 260px;
            margin-bottom: 15px;
            overflow: hidden;
            border-radius: 12px;
            background: #ddd;
        }

        .slide-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slide-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.7);
            border: none;
            padding: 10px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 50%;
        }

        #prevBtn { left: 10px; }
        #nextBtn { right: 10px; }

        .title {
            font-size:22px;
            font-weight:700;
            margin-bottom:10px;
        }

        .desc {
            font-size:16px;
            margin-bottom:15px;
        }

        .file {
            margin-bottom:8px;
            font-size:16px;
        }

        .file a {
            color:#2E7D32;
            text-decoration:none;
            font-weight:600;
        }

        .like-btn {
            font-size:26px;
            cursor:pointer;
            user-select:none;
            margin-top:10px;
        }

        .like-count {
            font-size:15px;
            margin-left:8px;
            color:#555;
        }

        .delete-btn {
            background:#c62828;
            color:white;
            padding:10px;
            border:none;
            border-radius:10px;
            width:100%;
            margin-top:15px;
            font-weight:600;
            cursor:pointer;
            box-shadow:0 3px 0 #8e0000;
        }

        .comment {
            background:#fafafa;
            border:1px solid #D7C4A3;
            padding:10px;
            border-radius:10px;
            margin-bottom:10px;
        }

        .comment-user {
            font-weight:600;
            margin-bottom:4px;
        }

        .comment-input {
            width:100%;
            padding:12px;
            border:1px solid #D7C4A3;
            border-radius:10px;
            margin-top:10px;
        }

        .btn {
            width:100%;
            padding:14px;
            background:#2E7D32;
            color:white;
            border:none;
            border-radius:10px;
            font-weight:600;
            cursor:pointer;
            box-shadow:0 3px 0 #1B5E20;
            margin-top:10px;
        }
    </style>
</head>
<body>

<nav>
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div style="display:flex; align-items:center; gap:15px;">
        <a href="home.html">ホーム</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="container">
    <div class="post-card">

        <!-- 画像スライダー -->
        <div class="slider">
            <button class="slide-btn" id="prevBtn">←</button>
            <img id="slideImage" class="slide-img">
            <button class="slide-btn" id="nextBtn">→</button>
        </div>

        <!-- 本文 -->
        <div class="title" id="title"></div>
        <div class="desc" id="desc"></div>

        <h3>📎 添付ファイル</h3>
        <div id="files"></div>

        <p style="margin-top:15px; font-size:14px; color:#555;">
            投稿者：<span id="author"></span><br>
            投稿日時：<span id="date"></span>
        </p>

        <div>
            <span id="likeBtn" class="like-btn">🤍</span>
            <span id="likeCount" class="like-count">0件</span>
        </div>

        <button id="deleteBtn" class="delete-btn" style="display:none;">投稿を削除する</button>

        <h3>💬 コメント</h3>
        <div id="comments"></div>

        <textarea id="commentInput" class="comment-input" placeholder="コメントを書く…"></textarea>
        <button class="btn" id="sendComment">コメントを送信</button>

    </div>
</div>

<script>
/* Firebase 設定 */
const firebaseConfig = {
  apiKey: "AIzaSyD121KvHW6Dtda16wFLOQ4IGOManS_bPl4",
  authDomain: "scoutnet12.firebaseapp.com",
  projectId: "scoutnet12",
  storageBucket: "scoutnet12.firebasestorage.app",
  messagingSenderId: "572737738511",
  appId: "1:572737738511:web:36a6a477c7ec6b8db7507a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

let currentUser = null;

firebase.auth().onAuthStateChanged(user => {
    if (!user) {
        location.href = "login.html";
        return;
    }
    currentUser = user.uid;
});

const params = new URLSearchParams(location.search);
const postId = params.get("id");

const postRef = db.collection("posts").doc(postId);
let likeRef = null;

firebase.auth().onAuthStateChanged(user => {
    if (!user) {
        location.href = "login.html";
        return;
    }
    currentUser = user.uid;

    // ← ここで初めて likeRef を作る（正しいタイミング）
    likeRef = postRef.collection("likes").doc(currentUser);

    // いいね状態の監視もここで開始
    likeRef.onSnapshot((snap) => {
        document.getElementById("likeBtn").textContent = snap.exists ? "❤️" : "🤍";
    });
});

let postData = null;

/* 投稿読み込み（完全版） */
postRef.get().then(async (snap) => {
    if (!snap.exists) {
        alert("投稿が見つかりません");
        location.href = "home.html";
        return;
    }

    const post = snap.data();
    postData = post;

    document.getElementById("title").textContent = post.title || "(タイトルなし)";
    document.getElementById("desc").textContent = post.description || "";

    /* createdAt（Timestamp / 数値 / null 全対応） */
    let createdAt = "";
    if (post.createdAt?.toMillis) {
        createdAt = new Date(post.createdAt.toMillis()).toLocaleString();
    } else if (typeof post.createdAt === "number") {
        createdAt = new Date(post.createdAt).toLocaleString();
    } else {
        createdAt = "日時不明";
    }
    document.getElementById("date").textContent = createdAt;

    /* 投稿者名 */
    const userSnap = await db.collection("users").doc(post.createdBy).get();
    const authorName = userSnap.exists ? (userSnap.data().name || "名前未設定") : "不明なユーザー";
    document.getElementById("author").textContent = authorName;

    /* 添付ファイル */
    const filesDiv = document.getElementById("files");
    const files = post.files || [];
    files.forEach(url => {
        const fileName = decodeURIComponent(url.split("/").pop().split("?")[0]);
        filesDiv.innerHTML += `
            <div class="file">📄 <a href="${url}" target="_blank">${fileName}</a></div>
        `;
    });

    /* 投稿者なら削除ボタン表示 */
    // 管理者UID（周作）
const ADMIN_UID = "51LQrBx2m5Pru43eIQOdVUtlkXC3";

// 投稿者 or 管理者なら削除ボタンを表示
if (post.createdBy === currentUser || currentUser === ADMIN_UID) {
    document.getElementById("deleteBtn").style.display = "block";
}

    /* 画像スライダー */
    const slideImage = document.getElementById("slideImage");
    let images = post.images || [];
    let currentIndex = 0;

    function updateSlide() {
        if (images.length > 0) {
            slideImage.src = images[currentIndex];
            slideImage.style.display = "block";
        } else {
            slideImage.style.display = "none";
        }
    }

    document.getElementById("prevBtn").onclick = () => {
        if (images.length === 0) return;
        currentIndex = (currentIndex - 1 + images.length) % images.length;
        updateSlide();
    };

    document.getElementById("nextBtn").onclick = () => {
        if (images.length === 0) return;
        currentIndex = (currentIndex + 1) % images.length;
        updateSlide();
    };

    updateSlide();
});

/* ❤️ いいね状態 */
likeRef.onSnapshot((snap) => {
    document.getElementById("likeBtn").textContent = snap.exists ? "❤️" : "🤍";
});

/* ❤️ いいね数 */
postRef.collection("likes").onSnapshot((snapshot) => {
    document.getElementById("likeCount").textContent = snapshot.size + "件";
});

/* ❤️ いいね押したとき（完全版） */
document.getElementById("likeBtn").onclick = async () => {
    const snap = await likeRef.get();

    if (snap.exists) {
        await likeRef.delete();
    } else {
        await likeRef.set({
            user: currentUser,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        if (postData.createdBy !== currentUser) {
            await db.collection("notifications").add({
                to: postData.createdBy,
                from: currentUser,
                type: "like",
                postId,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
    }
};

/* 💬 コメント読み込み（高速版） */
postRef.collection("comments")
    .orderBy("createdAt", "asc")
    .onSnapshot(async (snapshot) => {

        const commentsDiv = document.getElementById("comments");
        commentsDiv.innerHTML = "";

        const userIds = [...new Set(snapshot.docs.map(doc => doc.data().user))];

        const userSnaps = await Promise.all(
            userIds.map(uid => db.collection("users").doc(uid).get())
        );

        const userMap = {};
        userSnaps.forEach((snap, i) => {
            userMap[userIds[i]] = snap.exists ? snap.data().name : "不明なユーザー";
        });

        snapshot.docs.forEach(docSnap => {
            const c = docSnap.data();
            const userName = userMap[c.user] || "不明なユーザー";

            commentsDiv.innerHTML += `
                <div class="comment">
                    <div class="comment-user">${userName}</div>
                    <div>${c.text}</div>
                </div>
            `;
        });
    });

/* 💬 コメント送信（完全版） */
document.getElementById("sendComment").onclick = async () => {
    const text = document.getElementById("commentInput").value.trim();
    if (!text) return;

    await postRef.collection("comments").add({
        text,
        user: currentUser,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    document.getElementById("commentInput").value = "";

    if (postData.createdBy !== currentUser) {
        await db.collection("notifications").add({
            to: postData.createdBy,
            from: currentUser,
            type: "comment",
            postId,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
    }
};

/* 🗑 投稿削除（安全版） */
document.getElementById("deleteBtn").onclick = async () => {
    if (!confirm("本当に削除しますか？")) return;

    /* 画像削除 */
    if (postData.images) {
        for (let url of postData.images) {
            try {
                const path = decodeURIComponent(url.split("/o/")[1].split("?")[0]);
                await storage.ref(path).delete();
            } catch (e) {}
        }
    }

    /* ファイル削除 */
    if (postData.files) {
        for (let url of postData.files) {
            try {
                const path = decodeURIComponent(url.split("/o/")[1].split("?")[0]);
                await storage.ref(path).delete();
            } catch (e) {}
        }
    }

    await postRef.delete();

    alert("投稿を削除しました");
    location.href = "home.html";
};
</script>

</body>
</html>


</body>
</html>
