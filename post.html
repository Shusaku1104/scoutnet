<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - 投稿する</title>

    <!-- ★ スマホ対応に必須 ★ -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            margin: 0;
            background: #f5f5f5;
        }

        h2 {
            margin-bottom: 20px;
            color: #2E7D32;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #1B5E20;
        }

        /* ★ スマホ用調整（念のため）★ */
        @media (max-width: 600px) {
            body {
                padding: 15px;
            }
        }
    </style>
</head>
<body>

<h2>新規投稿</h2>

<input id="title" placeholder="タイトル">
<textarea id="description" placeholder="内容"></textarea>

<select id="category">
    <option value="indoor">Indoor</option>
    <option value="outdoor">Outdoor</option>
</select>

<button id="submitBtn">投稿する</button>

<script>
    document.getElementById("submitBtn").addEventListener("click", () => {
        const title = document.getElementById("title").value;
        const description = document.getElementById("description").value;
        const category = document.getElementById("category").value;

        const posts = JSON.parse(localStorage.getItem("posts") || "[]");

        const newPost = {
            id: Date.now(),
            title,
            description,
            category,
            likesUsers: [],
            comments: []
        };

        posts.push(newPost);
        localStorage.setItem("posts", JSON.stringify(posts));

        alert("投稿しました！");
        location.href = "index.html";
    });
</script>

</body>
</html>
