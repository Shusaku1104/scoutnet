<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - 投稿詳細</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }

        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
            margin-left:15px;
        }

        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }

        .post-card {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:16px;
            box-shadow:0 4px 0 #D7C4A3;
        }

        .title {
            font-size:22px;
            font-weight:700;
            margin-bottom:10px;
        }

        .desc {
            font-size:16px;
            margin-bottom:15px;
        }

        .file {
            margin-bottom:8px;
            font-size:16px;
        }

        .file a {
            color:#2E7D32;
            text-decoration:none;
            font-weight:600;
        }

        .like-btn {
            font-size:22px;
            cursor:pointer;
            user-select:none;
            margin-top:10px;
        }

        .like-count {
            font-size:15px;
            margin-left:8px;
            color:#555;
        }

        .delete-btn {
            background:#c62828;
            color:white;
            padding:10px;
            border:none;
            border-radius:10px;
            width:100%;
            margin-top:15px;
            font-weight:600;
            cursor:pointer;
            box-shadow:0 3px 0 #8e0000;
        }

        .comment {
            background:#fafafa;
            border:1px solid #D7C4A3;
            padding:10px;
            border-radius:10px;
            margin-bottom:10px;
        }

        .comment-user {
            font-weight:600;
            margin-bottom:4px;
        }

        .comment-input {
            width:100%;
            padding:12px;
            border:1px solid #D7C4A3;
            border-radius:10px;
            margin-top:10px;
        }

        .btn {
            width:100%;
            padding:14px;
            background:#2E7D32;
            color:white;
            border:none;
            border-radius:10px;
            font-weight:600;
            cursor:pointer;
            box-shadow:0 3px 0 #1B5E20;
            margin-top:10px;
        }
    </style>
</head>
<body>

<nav>
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div>
        <a href="home.html">ホーム</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="container">
    <div class="post-card">

        <div class="title" id="title"></div>
        <div class="desc" id="desc"></div>

        <h3>📎 添付ファイル</h3>
        <div id="files"></div>

        <p style="margin-top:15px; font-size:14px; color:#555;">
            投稿者：<span id="author"></span><br>
            投稿日時：<span id="date"></span>
        </p>

        <!-- ❤️ いいね -->
        <div>
            <span id="likeBtn" class="like-btn">🤍</span>
            <span id="likeCount" class="like-count">0件</span>
        </div>

        <!-- 削除ボタン（投稿者のみ表示） -->
        <button id="deleteBtn" class="delete-btn" style="display:none;">投稿を削除する</button>

        <h3>💬 コメント</h3>
        <div id="comments"></div>

        <textarea id="commentInput" class="comment-input" placeholder="コメントを書く…"></textarea>
        <button class="btn" id="sendComment">コメントを送信</button>

    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
    getFirestore, doc, getDoc, collection, addDoc, query, orderBy, onSnapshot, deleteDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { 
    getStorage, ref, deleteObject 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
    apiKey: "AIzaSyDrvBB4R30sV_AhzzpJY9_d5x0biDp8uyA",
    authDomain: "scoutnet-3ccb1.firebaseapp.com",
    projectId: "scoutnet-3ccb1",
    storageBucket: "scoutnet-3ccb1.appspot.com",
    messagingSenderId: "619869604171",
    appId: "1:619869604171:web:7ba88ab8eb9a0bff0ec0ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const currentUser = localStorage.getItem("currentUser");
if (!currentUser) location.href = "login.html";

const params = new URLSearchParams(location.search);
const postId = params.get("id");

const postRef = doc(db, "posts", postId);
const likeRef = doc(db, "posts", postId, "likes", currentUser);

let postData = null;

// 投稿読み込み
const postSnap = await getDoc(postRef);
if (postSnap.exists()) {
    const post = postSnap.data();
    postData = post;

    document.getElementById("title").textContent = post.title;
    document.getElementById("desc").textContent = post.description;
    document.getElementById("date").textContent = new Date(post.createdAt).toLocaleString();

    // 投稿者名
    const userRef = doc(db, "users", post.createdBy);
    const userSnap = await getDoc(userRef);
    document.getElementById("author").textContent = userSnap.exists() ? userSnap.data().name : post.createdBy;

    // ファイル
    const filesDiv = document.getElementById("files");
    if (post.files) {
        post.files.forEach(url => {
            const fileName = decodeURIComponent(url.split("/").pop().split("?")[0]);
            filesDiv.innerHTML += `
                <div class="file">📄 <a href="${url}" target="_blank">${fileName}</a></div>
            `;
        });
    }

    // 投稿者なら削除ボタン表示
    if (post.createdBy === currentUser) {
        document.getElementById("deleteBtn").style.display = "block";
    }
}

// ❤️ いいね状態チェック
onSnapshot(likeRef, (snap) => {
    const likeBtn = document.getElementById("likeBtn");
    if (snap.exists()) {
        likeBtn.textContent = "❤️";
    } else {
        likeBtn.textContent = "🤍";
    }
});

// ❤️ いいね数
onSnapshot(collection(db, "posts", postId, "likes"), (snapshot) => {
    document.getElementById("likeCount").textContent = snapshot.size + "件";
});

// ❤️ いいね押したとき
document.getElementById("likeBtn").addEventListener("click", async () => {
    const snap = await getDoc(likeRef);

    if (snap.exists()) {
        // いいね解除
        await deleteDoc(likeRef);
    } else {
        // いいね追加
        await setDoc(likeRef, {
            user: currentUser,
            createdAt: Date.now()
        });

        // 通知（投稿者 ≠ 自分）
        if (postData.createdBy !== currentUser) {
            await addDoc(collection(db, "notifications"), {
                to: postData.createdBy,
                from: currentUser,
                type: "like",
                postId,
                createdAt: Date.now()
            });
        }
    }
});

// 💬 コメント読み込み
const commentsRef = collection(db, "posts", postId, "comments");
const q = query(commentsRef, orderBy("createdAt", "asc"));

onSnapshot(q, (snapshot) => {
    const commentsDiv = document.getElementById("comments");
    commentsDiv.innerHTML = "";

    snapshot.forEach((docSnap) => {
        const c = docSnap.data();
        commentsDiv.innerHTML += `
            <div class="comment">
                <div class="comment-user">${c.user}</div>
                <div>${c.text}</div>
            </div>
        `;
    });
});

// 💬 コメント送信
document.getElementById("sendComment").addEventListener("click", async () => {
    const text = document.getElementById("commentInput").value.trim();
    if (!text) return;

    await addDoc(commentsRef, {
        text,
        user: currentUser,
        createdAt: Date.now()
    });

    document.getElementById("commentInput").value = "";

    // 通知
    if (postData.createdBy !== currentUser) {
        await addDoc(collection(db, "notifications"), {
            to: postData.createdBy,
            from: currentUser,
            type: "comment",
            postId,
            createdAt: Date.now()
        });
    }
});

// 🗑 投稿削除
document.getElementById("deleteBtn").addEventListener("click", async () => {
    if (!confirm("本当に削除しますか？")) return;

    // 画像削除
    if (postData.images) {
        for (let url of postData.images) {
            const path = decodeURIComponent(url.split("/o/")[1].split("?")[0]);
            await deleteObject(ref(storage, path));
        }
    }

    // ファイル削除
    if (postData.files) {
        for (let url of postData.files) {
            const path = decodeURIComponent(url.split("/o/")[1].split("?")[0]);
            await deleteObject(ref(storage, path));
        }
    }

    // 投稿削除
    await deleteDoc(postRef);

    alert("投稿を削除しました");
    location.href = "home.html";
});
</script>

</body>
</html>
