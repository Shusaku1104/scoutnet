<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - Outdoor</title>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
            color: #4E342E;
        }

        /* ナビバー */
        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:#ffffff;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
        }

        nav a:hover {
            color:#2E7D32;
        }

        /* カード */
        .card {
            background: #FFFFFF;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid #D7C4A3;
            margin: 20px;
            box-shadow: 0 4px 0 #D7C4A3;
        }

        h2 {
            font-weight: 700;
            margin-bottom: 16px;
            color: #2E7D32;
            border-left: 6px solid #66BB6A;
            padding-left: 10px;
        }

        /* 投稿カード */
        .post {
            background: white;
            border: 1px solid #D7C4A3;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 16px;
            box-shadow: 0 3px 0 #D7C4A3;
            cursor: pointer;
        }

        .post img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<!-- ScoutNet ナビバー -->
<nav>
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div style="display:flex; gap:18px; font-size:15px; font-weight:600;">
        <a href="index.html">ホーム</a>
        <a href="post.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="card">
    <h2>⛺ Outdoor の投稿</h2>
    <div id="postList"></div>
</div>

<script>
    const posts = JSON.parse(localStorage.getItem("posts") || "[]");
    const postList = document.getElementById("postList");

    const outdoorPosts = posts.filter(p => p.category === "outdoor");

    if (outdoorPosts.length === 0) {
        postList.innerHTML = "<p>Outdoor の投稿はまだありません。</p>";
    } else {
        outdoorPosts.slice().reverse().forEach(post => {
            const div = document.createElement("div");
            div.className = "post";

            if (post.images?.length) {
                const img = document.createElement("img");
                img.src = post.images[0];
                div.appendChild(img);
            }

            div.innerHTML += `<h3>${post.title}</h3><p>${post.description}</p>`;

            div.addEventListener("click", () => {
                window.location.href = "post.html?id=" + post.id;
            });

            postList.appendChild(div);
        });
    }
</script>

</body>
</html>
