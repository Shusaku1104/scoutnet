<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - アウトドア投稿</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }

        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
            margin-left:15px;
        }

        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }

        .post {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:16px;
            margin-bottom:20px;
            box-shadow:0 4px 0 #D7C4A3;
            cursor:pointer;
        }

        .post img {
            width:100%;
            border-radius:12px;
            margin-bottom:10px;
        }

        .category-tag {
            display:inline-block;
            background:#E8F5E9;
            color:#2E7D32;
            padding:4px 10px;
            border-radius:8px;
            font-size:13px;
            margin-bottom:6px;
            border:1px solid #A5D6A7;
        }

        .title {
            font-size:20px;
            font-weight:600;
            margin-bottom:8px;
        }

        .desc {
            font-size:15px;
            margin-bottom:10px;
        }
    </style>
</head>
<body>

<nav>
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div>
        <a href="home.html">ホーム</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="container">
    <h2 style="color:#2E7D32; margin-bottom:20px;">🏕 アウトドア投稿一覧</h2>
    <div id="postList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDrvBB4R30sV_AhzzpJY9_d5x0biDp8uyA",
    authDomain: "scoutnet-3ccb1.firebaseapp.com",
    projectId: "scoutnet-3ccb1",
    storageBucket: "scoutnet-3ccb1.appspot.com",
    messagingSenderId: "619869604171",
    appId: "1:619869604171:web:7ba88ab8eb9a0bff0ec0ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const user = localStorage.getItem("currentUser");
if (!user) location.href = "login.html";

const postList = document.getElementById("postList");

/* Firestore：アウトドア投稿だけ取得 */
const q = query(
    collection(db, "posts"),
    where("category", "==", "アウトドア"),
    orderBy("createdAt", "desc")
);

onSnapshot(q, (snapshot) => {
    postList.innerHTML = "";

    snapshot.forEach((docSnap) => {
        const post = docSnap.data();
        const id = docSnap.id;

        const div = document.createElement("div");
        div.className = "post";

        if (post.images && post.images.length > 0) {
            const img = document.createElement("img");
            img.src = post.images[0];
            div.appendChild(img);
        }

        const tag = document.createElement("div");
        tag.className = "category-tag";
        tag.textContent = post.category;
        div.appendChild(tag);

        const title = document.createElement("div");
        title.className = "title";
        title.textContent = post.title;

        const desc = document.createElement("div");
        desc.className = "desc";
        desc.textContent = post.description;

        div.appendChild(title);
        div.appendChild(desc);

        div.addEventListener("click", () => {
            location.href = "post.html?id=" + id;
        });

        postList.appendChild(div);
    });
});
</script>

</body>
</html>
