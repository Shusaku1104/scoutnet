<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - アウトドア投稿一覧</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Firebase 8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }

        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
            margin-left:15px;
            transition:0.1s;
        }
        nav a:active {
            transform:scale(0.95);
            opacity:0.8;
        }

        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }

        #loading {
            text-align:center;
            margin-top:40px;
            font-size:18px;
            color:#777;
        }

        .post {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:16px;
            margin-bottom:20px;
            box-shadow:0 4px 0 #D7C4A3;
            cursor:pointer;
            transition:0.1s;
        }
        .post:active {
            transform:scale(0.98);
            box-shadow:0 2px 0 #BCA68A;
        }

        .post img {
            width:100%;
            border-radius:12px;
            margin-bottom:10px;
        }

        .category-tag {
            display:inline-block;
            background:#E8F5E9;
            color:#2E7D32;
            padding:4px 10px;
            border-radius:8px;
            font-size:13px;
            margin-bottom:6px;
            border:1px solid #A5D6A7;
        }

        .title {
            font-size:20px;
            font-weight:600;
            margin-bottom:8px;
        }

        .desc {
            font-size:15px;
            margin-bottom:10px;
        }

        #pager {
            text-align:center;
            margin:20px 0;
        }
        #pager button {
            padding:8px 14px;
            margin:0 10px;
            border-radius:8px;
            border:1px solid #A5D6A7;
            cursor:pointer;
            transition:0.1s;
        }
        #pager button:active {
            transform:scale(0.95);
            opacity:0.8;
        }
    </style>
</head>
<body>

<nav>
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div>
        <a href="home.html">ホーム</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="container">
    <h2 style="color:#2E7D32; margin-bottom:20px;">🏕 アウトドア投稿一覧</h2>

    <div id="loading">読み込み中…</div>
    <div id="postList"></div>

    <div id="pager">
        <button id="prevBtn" disabled>前へ</button>
        <button id="nextBtn" disabled>次へ</button>
    </div>
</div>

<script>
/* Firebase 設定（ScoutNet12） */
const firebaseConfig = {
  apiKey: "AIzaSyD121KvHW6Dtda16wFLOQ4IGOManS_bPl4",
  authDomain: "scoutnet12.firebaseapp.com",
  projectId: "scoutnet12",
  storageBucket: "scoutnet12.firebasestorage.app",
  messagingSenderId: "572737738511",
  appId: "1:572737738511:web:36a6a477c7ec6b8db7507a"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ログイン確認 */
auth.onAuthStateChanged(user => {
    if (!user) location.href = "login.html";
});

/* UI */
const postList = document.getElementById("postList");
const loading = document.getElementById("loading");

let lastDoc = null;
let firstDoc = null;
const perPage = 10;

/* 投稿読み込み */
async function loadPosts(direction = "none") {
    postList.innerHTML = "";
    loading.style.display = "block";

    let ref = db.collection("posts")
        .where("category", "==", "アウトドア")
        .orderBy("createdAt", "desc");

    if (direction === "next" && lastDoc) ref = ref.startAfter(lastDoc);
    if (direction === "prev" && firstDoc) ref = ref.endBefore(firstDoc);

    const snap = await ref.limit(perPage).get();

    loading.style.display = "none";

    if (snap.empty) {
        postList.innerHTML = `
            <p style="text-align:center; margin-top:30px;">
                アウトドア投稿がまだありません<br>
                <a href="newpost.html" style="color:#2E7D32; font-weight:700;">投稿してみる？</a>
            </p>`;
        return;
    }

    firstDoc = snap.docs[0];
    lastDoc = snap.docs[snap.docs.length - 1];

    snap.docs.forEach(doc => {
        const post = doc.data();
        const id = doc.id;

        const div = document.createElement("div");
        div.className = "post";

        if (post.images && post.images.length > 0) {
            const img = document.createElement("img");
            img.src = post.images[0];
            div.appendChild(img);
        }

        const tag = document.createElement("div");
        tag.className = "category-tag";
        tag.textContent = post.category;
        div.appendChild(tag);

        const title = document.createElement("div");
        title.className = "title";
        title.textContent = post.title;
        div.appendChild(title);

        const desc = document.createElement("div");
        desc.className = "desc";
        desc.textContent = post.description;
        div.appendChild(desc);

        div.addEventListener("click", () => {
            location.href = "post.html?id=" + id;
        });

        postList.appendChild(div);
    });

    document.getElementById("prevBtn").disabled = !firstDoc;
    document.getElementById("nextBtn").disabled = snap.size < perPage;
}

document.getElementById("nextBtn").onclick = () => loadPosts("next");
document.getElementById("prevBtn").onclick = () => loadPosts("prev");

loadPosts();
</script>

</body>
</html>
