<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - ホーム</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Firebase 8系（スマホ安定版） -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }

        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
        }

        /* 🔥 追加：右側メニューを横スクロール可能にする */
        nav div:last-child {
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        nav div:last-child a,
        nav div:last-child button {
            display: inline-block;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
            margin-left:15px;
        }

        #categoryBtn {
            background:#2E7D32;
            color:white;
            padding:8px 14px;
            border-radius:8px;
            cursor:pointer;
            font-weight:600;
            border:none;
        }

        #categoryMenu {
            position:absolute;
            right:20px;
            top:60px;
            background:white;
            border:2px solid #D7C4A3;
            border-radius:12px;
            box-shadow:0 4px 0 #D7C4A3;
            display:none;
            width:150px;
        }

        .category-item {
            padding:12px;
            cursor:pointer;
            border-bottom:1px solid #EEE;
        }

        .category-item:hover {
            background:#F1F8E9;
        }

        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }

        .post {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:16px;
            margin-bottom:20px;
            box-shadow:0 4px 0 #D7C4A3;
            cursor:pointer;
        }

        .post img {
            width:100%;
            border-radius:12px;
            margin-bottom:10px;
        }

        .title {
            font-size:20px;
            font-weight:600;
            margin-bottom:8px;
        }

        .category-tag {
            display:inline-block;
            background:#E8F5E9;
            color:#2E7D32;
            padding:4px 10px;
            border-radius:8px;
            font-size:13px;
            margin-bottom:6px;
            border:1px solid #A5D6A7;
        }

        .desc {
            font-size:15px;
            margin-bottom:10px;
        }
    </style>
</head>
<body>

<nav>
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div style="display:flex; align-items:center; gap:15px;">
        <button id="categoryBtn">カテゴリ ▼</button>

        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div id="categoryMenu">
    <div class="category-item" data-cat="すべて">すべて</div>
    <div class="category-item" data-cat="アウトドア">アウトドア</div>
    <div class="category-item" data-cat="インドア">インドア</div>
    <div class="category-item" data-cat="奉仕">奉仕</div>
</div>

<div class="container">
    <div id="postList"></div>
</div>

<script>
/* Firebase 設定（ScoutNet12 の値に差し替え） */
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "scoutnet12.firebaseapp.com",
    projectId: "scoutnet12",
    storageBucket: "scoutnet12.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ログイン確認 */
const user = localStorage.getItem("currentUser");
if (!user) location.href = "login.html";

/* UI 要素 */
const postList = document.getElementById("postList");
const categoryBtn = document.getElementById("categoryBtn");
const categoryMenu = document.getElementById("categoryMenu");

let currentCategory = "すべて";

/* カテゴリメニュー表示切替 */
categoryBtn.addEventListener("click", () => {
    categoryMenu.style.display =
        categoryMenu.style.display === "block" ? "none" : "block";
});

/* カテゴリ選択 */
document.querySelectorAll(".category-item").forEach(item => {
    item.addEventListener("click", () => {
        currentCategory = item.dataset.cat;
        categoryMenu.style.display = "none";
        loadPosts();
    });
});

/* 投稿読み込み（カテゴリ対応） */
function loadPosts() {
    postList.innerHTML = "";

    let ref = db.collection("posts").orderBy("createdAt", "desc");

    if (currentCategory !== "すべて") {
        ref = db.collection("posts")
            .where("category", "==", currentCategory)
            .orderBy("createdAt", "desc");
    }

    ref.onSnapshot(snapshot => {
        postList.innerHTML = "";

        snapshot.forEach(doc => {
            const post = doc.data();
            const id = doc.id;

            const div = document.createElement("div");
            div.className = "post";

            if (post.images && post.images.length > 0) {
                const img = document.createElement("img");
                img.src = post.images[0];
                div.appendChild(img);
            }

            const tag = document.createElement("div");
            tag.className = "category-tag";
            tag.textContent = post.category;
            div.appendChild(tag);

            const title = document.createElement("div");
            title.className = "title";
            title.textContent = post.title;

            const desc = document.createElement("div");
            desc.className = "desc";
            desc.textContent = post.description;

            div.appendChild(title);
            div.appendChild(desc);

            div.addEventListener("click", () => {
                location.href = "post.html?id=" + id;
            });

            postList.appendChild(div);
        });
    });
}

loadPosts();
</script>

</body>
</html>
