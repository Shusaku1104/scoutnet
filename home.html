<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - ホーム</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Firebase 8系 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }

        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
        }

        /* 透明の壁を完全削除 */
        nav div:last-child {
            white-space: nowrap;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
            margin-left:15px;
        }

        #categoryBtn {
            background:#2E7D32;
            color:white;
            padding:8px 14px;
            border-radius:8px;
            cursor:pointer;
            font-weight:600;
            border:none;
        }

        #categoryMenu {
            position:absolute;
            left:20px;
            top:60px;
            background:white;
            border:2px solid #D7C4A3;
            border-radius:12px;
            box-shadow:0 4px 0 #D7C4A3;
            display:none;
            width:150px;
            pointer-events:none;
            z-index:200;
        }

        .category-item {
            padding:12px;
            cursor:pointer;
            border-bottom:1px solid #EEE;
        }

        .category-item:hover {
            background:#F1F8E9;
        }

        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }

        .post {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:16px;
            margin-bottom:20px;
            box-shadow:0 4px 0 #D7C4A3;
            cursor:pointer;
        }

        .post img {
            width:100%;
            border-radius:12px;
            margin-bottom:10px;
        }

        .title {
            font-size:20px;
            font-weight:600;
            margin-bottom:8px;
        }

        .category-tag {
            display:inline-block;
            background:#E8F5E9;
            color:#2E7D32;
            padding:4px 10px;
            border-radius:8px;
            font-size:13px;
            margin-bottom:6px;
            border:1px solid #A5D6A7;
        }

        .desc {
            font-size:15px;
            margin-bottom:10px;
        }
    </style>
</head>
<body>

<nav>
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div style="display:flex; align-items:center; gap:15px;">
        <button id="categoryBtn">カテゴリ ▼</button>
        <a href="about.html">このサイトについて</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div id="categoryMenu">
    <div class="category-item" data-cat="すべて">すべて</div>
    <div class="category-item" data-cat="アウトドア">アウトドア</div>
    <div class="category-item" data-cat="インドア">インドア</div>
    <div class="category-item" data-cat="奉仕">奉仕</div>
</div>

<div class="container">
    <div id="postList"></div>
    <div id="pagination" style="text-align:center; margin:20px 0;"></div>
</div>

<script>
/* Firebase 設定（Storage 修正版と同じプロジェクト） */
const firebaseConfig = {
  apiKey: "AIzaSyD121KvHW6Dtda16wFLOQ4IGOManS_bPl4",
  authDomain: "scoutnet12.firebaseapp.com",
  projectId: "scoutnet12",
  storageBucket: "scoutnet12.appspot.com",   // ← 修正済み！
  messagingSenderId: "572737738511",
  appId: "1:572737738511:web:36a6a477c7ec6b8db7507a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ログイン確認 */
const user = localStorage.getItem("currentUser");
if (!user) location.href = "login.html";

/* UI */
const postList = document.getElementById("postList");
const categoryBtn = document.getElementById("categoryBtn");
const categoryMenu = document.getElementById("categoryMenu");

let currentCategory = "すべて";
let currentPage = 1;
const perPage = 10;
let totalPages = 1;

/* カテゴリメニュー開閉 */
categoryBtn.addEventListener("click", () => {
    const isOpen = categoryMenu.style.display === "block";
    categoryMenu.style.display = isOpen ? "none" : "block";
    categoryMenu.style.pointerEvents = isOpen ? "none" : "auto";
});

/* カテゴリ選択 */
document.querySelectorAll(".category-item").forEach(item => {
    item.addEventListener("click", () => {
        currentCategory = item.dataset.cat;
        currentPage = 1;
        categoryMenu.style.display = "none";
        categoryMenu.style.pointerEvents = "none";
        loadPosts();
    });
});

/* ページ番号生成 */
function renderPagination() {
    const pag = document.getElementById("pagination");
    pag.innerHTML = "";

    for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement("button");
        btn.textContent = i;
        btn.style.margin = "0 5px";
        btn.style.padding = "6px 12px";
        btn.style.borderRadius = "6px";
        btn.style.border = "1px solid #A5D6A7";
        btn.style.background = (i === currentPage) ? "#2E7D32" : "white";
        btn.style.color = (i === currentPage) ? "white" : "#2E7D32";
        btn.style.cursor = "pointer";

        btn.addEventListener("click", () => {
            currentPage = i;
            loadPosts();
        });

        pag.appendChild(btn);
    }
}

/* 投稿読み込み */
async function loadPosts() {
    postList.innerHTML = "";

    let ref = db.collection("posts");

    if (currentCategory !== "すべて") {
        ref = ref.where("category", "==", currentCategory);
    }

    const totalSnap = await ref.get();
    const totalCount = totalSnap.size;

    totalPages = Math.ceil(totalCount / perPage);
    renderPagination();

    const startIndex = (currentPage - 1) * perPage;

    const ordered = ref.orderBy("createdAt", "desc");
    const pageSnap = await ordered.get();

    const docs = pageSnap.docs.slice(startIndex, startIndex + perPage);

    docs.forEach(doc => {
        const post = doc.data();
        const id = doc.id;

        const div = document.createElement("div");
        div.className = "post";

        if (post.images && post.images.length > 0) {
            const img = document.createElement("img");
            img.src = post.images[0];
            div.appendChild(img);
        }

        const tag = document.createElement("div");
        tag.className = "category-tag";
        tag.textContent = post.category;
        div.appendChild(tag);

        const title = document.createElement("div");
        title.className = "title";
        title.textContent = post.title;

        const desc = document.createElement("div");
        desc.className = "desc";
        desc.textContent = post.description;

        div.appendChild(title);
        div.appendChild(desc);

        div.addEventListener("click", () => {
            location.href = "post.html?id=" + id;
        });

        postList.appendChild(div);
    });
}

loadPosts();
</script>

</body>
</html>
