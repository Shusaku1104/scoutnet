<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - ホーム</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Firebase 8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0 0 80px; /* ← 下タブの高さ確保 */
            color:#4E342E;
        }

        /* 上ナビバー（ロゴ固定） */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 200;
            background: white;
            padding: 14px 18px;
            border-bottom: 2px solid #D7C4A3;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .top-nav img {
            height: 28px;
        }
        .top-nav-title {
            font-size: 20px;
            font-weight: 700;
        }

        /* カテゴリタブ */
        nav {
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:56px;
            z-index:150;
            padding:10px;
        }
        nav .tab-scroll {
            display:flex;
            overflow-x:auto;
            white-space:nowrap;
            gap:15px;
        }
        nav .tab-scroll::-webkit-scrollbar {
            display:none;
        }
        nav a, #categoryBtn {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
            padding:8px 4px;
            display:inline-block;
        }
        nav a.active {
            color:#2E7D32;
            border-bottom:3px solid #2E7D32;
        }
        #categoryBtn {
            background:#2E7D32;
            color:white;
            padding:8px 14px;
            border-radius:8px;
            cursor:pointer;
            border:none;
        }

        /* カテゴリメニュー */
        #categoryMenu {
            position:absolute;
            left:20px;
            top:120px;
            background:white;
            border:2px solid #D7C4A3;
            border-radius:12px;
            box-shadow:0 4px 0 #D7C4A3;
            display:none;
            width:150px;
            z-index:300;
        }
        .category-item {
            padding:12px;
            cursor:pointer;
            border-bottom:1px solid #EEE;
        }
        .category-item:hover {
            background:#F1F8E9;
        }
        .category-active {
            background:#C8E6C9 !important;
            font-weight:700;
        }

        /* 投稿カード */
        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }
        .post {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:16px;
            margin-bottom:20px;
            box-shadow:0 4px 0 #D7C4A3;
            cursor:pointer;
        }
        .post img {
            width:100%;
            border-radius:12px;
            margin-bottom:10px;
        }
        .category-tag {
            display:inline-block;
            background:#E8F5E9;
            color:#2E7D32;
            padding:4px 10px;
            border-radius:8px;
            font-size:13px;
            margin-bottom:6px;
            border:1px solid #A5D6A7;
        }
        .title {
            font-size:20px;
            font-weight:600;
            margin-bottom:8px;
        }
        .desc {
            font-size:15px;
            margin-bottom:10px;
        }

        /* ページャー */
        #pager {
            text-align:center;
            margin:20px 0;
        }
        #pager button {
            padding:8px 14px;
            margin:0 10px;
            border-radius:8px;
            border:1px solid #A5D6A7;
            cursor:pointer;
        }

        /* 下タブ（インスタ風） */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: white;
            border-top: 2px solid #D7C4A3;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -3px 0 #D7C4A3;
            z-index: 999;
        }
        .bottom-nav a {
            text-decoration: none;
            color: #4E342E;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }
        .bottom-nav img {
            width: 26px;
            height: 26px;
        }
    </style>
</head>
<body>

<!-- 上ナビバー -->
<div class="top-nav">
    <img src="icons/logo.png">
    <div class="top-nav-title">ScoutNet</div>
</div>

<!-- カテゴリタブ -->
<nav>
    <div class="tab-scroll">
        <button id="categoryBtn">カテゴリ ▼</button>
        <a href="home.html" class="active">ホーム</a>
        <a href="about.html">このサイトについて</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<!-- カテゴリメニュー -->
<div id="categoryMenu">
    <div class="category-item" data-cat="すべて">すべて</div>
    <div class="category-item" data-cat="アウトドア">アウトドア</div>
    <div class="category-item" data-cat="インドア">インドア</div>
    <div class="category-item" data-cat="奉仕">奉仕</div>
    <div class="category-item" data-cat="その他">その他</div>
</div>

<!-- 投稿一覧 -->
<div class="container">
    <div id="loading">読み込み中…</div>
    <div id="postList"></div>

    <div id="pager">
        <button id="prevBtn" disabled>前へ</button>
        <button id="nextBtn" disabled>次へ</button>
    </div>
</div>

<!-- 下タブ -->
<div class="bottom-nav">
    <a href="home.html">
        <img src="icons/home.png"><br>ホーム
    </a>
    <a href="newpost.html">
        <img src="icons/add.png"><br>投稿
    </a>
    <a href="profile.html">
        <img src="icons/user.png"><br>プロフィール
    </a>
</div>

<script>
/* Firebase 設定 */
const firebaseConfig = {
  apiKey: "AIzaSyD121KvHW6Dtda16wFLOQ4IGOManS_bPl4",
  authDomain: "scoutnet12.firebaseapp.com",
  projectId: "scoutnet12",
  storageBucket: "scoutnet12.firebasestorage.app",
  messagingSenderId: "572737738511",
  appId: "1:572737738511:web:36a6a477c7ec6b8db7507a"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ログイン確認 */
auth.onAuthStateChanged(user => {
    if (!user) location.href = "login.html";
});

/* UI */
const postList = document.getElementById("postList");
const loading = document.getElementById("loading");
const categoryBtn = document.getElementById("categoryBtn");
const categoryMenu = document.getElementById("categoryMenu");

let currentCategory = "すべて";
let lastDoc = null;
let firstDoc = null;
const perPage = 10;

/* カテゴリメニュー開閉 */
categoryBtn.addEventListener("click", () => {
    categoryMenu.style.display =
        categoryMenu.style.display === "block" ? "none" : "block";
});

/* カテゴリ選択 */
document.querySelectorAll(".category-item").forEach(item => {
    item.addEventListener("click", () => {
        currentCategory = item.dataset.cat;

        document.querySelectorAll(".category-item")
            .forEach(i => i.classList.remove("category-active"));
        item.classList.add("category-active");

        categoryMenu.style.display = "none";

        lastDoc = null;
        firstDoc = null;

        loadPosts();
    });
});

/* 投稿読み込み */
async function loadPosts(direction = "none") {
    postList.innerHTML = "";
    loading.style.display = "block";

    let ref = db.collection("posts").orderBy("createdAt", "desc");

    if (currentCategory !== "すべて") {
        ref = ref.where("category", "==", currentCategory)
                 .orderBy("createdAt", "desc");
    }

    if (direction === "next" && lastDoc) ref = ref.startAfter(lastDoc);
    if (direction === "prev" && firstDoc) ref = ref.endBefore(firstDoc);

    const snap = await ref.limit(perPage).get();

    loading.style.display = "none";

    if (snap.empty) {
        postList.innerHTML = `
            <p style="text-align:center; margin-top:30px;">
                まだ投稿がありません<br>
                <a href="newpost.html" style="color:#2E7D32; font-weight:700;">投稿してみる？</a>
            </p>`;
        return;
    }

    firstDoc = snap.docs[0];
    lastDoc = snap.docs[snap.docs.length - 1];

    snap.docs.forEach(doc => {
        const post = doc.data();
        const id = doc.id;

        const div = document.createElement("div");
        div.className = "post";

        if (post.images && post.images.length > 0) {
            const img = document.createElement("img");
            img.src = post.images[0];
            div.appendChild(img);
        }

        const tag = document.createElement("div");
        tag.className = "category-tag";
        tag.textContent = post.category;
        div.appendChild(tag);

        const title = document.createElement("div");
        title.className = "title";
        title.textContent = post.title;
        div.appendChild(title);

        const desc = document.createElement("div");
        desc.className = "desc";
        desc.textContent = post.description;
        div.appendChild(desc);

        div.addEventListener("click", () => {
            location.href = "post.html?id=" + id;
        });

        postList.appendChild(div);
    });

    document.getElementById("prevBtn").disabled = !firstDoc;
    document.getElementById("nextBtn").disabled = snap.size < perPage;
}

document.getElementById("nextBtn").onclick = () => loadPosts("next");
document.getElementById("prevBtn").onclick = () => loadPosts("prev");

loadPosts();
</script>

</body>
</html>
