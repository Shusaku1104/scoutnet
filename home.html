<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - ホーム</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("service-worker.js");
      }
    </script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0 0 80px;
            color:#4E342E;
        }

        /* 上ナビバー */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 200;
            background: white;
            padding: 14px 18px;
            border-bottom: 2px solid #D7C4A3;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .top-nav img { height: 28px; }
        .top-nav-title {
            font-size: 20px;
            font-weight: 700;
        }

        /* カテゴリフィルター */
        .category-bar {
            background:white;
            border-bottom:2px solid #D7C4A3;
            padding:10px;
            position:sticky;
            top:56px;
            z-index:150;
        }
        .category-scroll {
            display:flex;
            overflow-x:auto;
            gap:15px;
            white-space:nowrap;
        }
        .category-scroll::-webkit-scrollbar { display:none; }

        .cat-btn {
            padding:8px 14px;
            border-radius:8px;
            border:1px solid #A5D6A7;
            background:white;
            font-weight:600;
            cursor:pointer;
        }
        .cat-active {
            background:#2E7D32;
            color:white;
            border-color:#2E7D32;
        }

        /* 投稿カード */
        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }
        .post-card {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:12px;
            box-shadow:0 4px 0 #D7C4A3;
            margin-bottom:18px;
            cursor:pointer;
        }
        .thumb {
            width:100%;
            height:200px;
            object-fit:cover;
            border-radius:12px;
            background:#ddd;
        }
        .title {
            font-size:18px;
            font-weight:700;
            margin-top:10px;
        }
        .meta {
            font-size:13px;
            color:#777;
            margin-top:4px;
        }

        #loading {
            text-align:center;
            padding:20px;
            color:#777;
        }

        /* 下タブ（5つ） */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: white;
            border-top: 2px solid #D7C4A3;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -3px 0 #D7C4A3;
            z-index: 999;
        }
        .bottom-nav a {
            text-decoration: none;
            color: #4E342E;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }
        .bottom-nav img {
            width: 26px;
            height: 26px;
        }
    </style>
</head>

<body>

<!-- 上ナビ -->
<div class="top-nav">
    <img src="icons/logo.png">
    <div class="top-nav-title">ScoutNet</div>
</div>

<!-- カテゴリフィルター -->
<div class="category-bar">
    <div class="category-scroll">
        <button class="cat-btn cat-active" data-cat="すべて">すべて</button>
        <button class="cat-btn" data-cat="アウトドア">アウトドア</button>
        <button class="cat-btn" data-cat="インドア">インドア</button>
        <button class="cat-btn" data-cat="奉仕">奉仕</button>
        <button class="cat-btn" data-cat="その他">その他</button>
    </div>
</div>

<!-- 投稿一覧 -->
<div class="container" id="postList">
    <p id="loading">読み込み中…</p>
</div>

<!-- 下タブ（5つ） -->
<div class="bottom-nav">
    <a href="home.html">
        <img src="icons/home.png"><br>ホーム
    </a>
    <a href="about.html">
        <img src="icons/info.png"><br>このサイト
    </a>
    <a href="newpost.html">
        <img src="icons/add.png"><br>投稿
    </a>
    <a href="profile.html">
        <img src="icons/user.png"><br>プロフィール
    </a>
    <a href="notify.html">
        <img src="icons/bell.png"><br>通知
    </a>
</div>

<script>
/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyD121KvHW6Dtda16wFLOQ4IGOManS_bPl4",
  authDomain: "scoutnet12.firebaseapp.com",
  projectId: "scoutnet12",
  storageBucket: "scoutnet12.firebasestorage.app",
  messagingSenderId: "572737738511",
  appId: "1:572737738511:web:36a6a477c7ec6b8db7507a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* UI */
const postList = document.getElementById("postList");
const loading = document.getElementById("loading");

let currentCategory = "すべて";
let lastDoc = null;
let isLoading = false;
const limit = 8;

/* カテゴリ切り替え */
document.querySelectorAll(".cat-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("cat-active"));
        btn.classList.add("cat-active");

        currentCategory = btn.dataset.cat;
        lastDoc = null;
        postList.innerHTML = "";
        loadPosts();
    });
});

/* 投稿読み込み */
async function loadPosts() {
    if (isLoading) return;
    isLoading = true;

    loading.style.display = "block";

    let ref = db.collection("posts")
        .orderBy("createdAt", "desc")
        .limit(limit);

    if (currentCategory !== "すべて") {
        ref = db.collection("posts")
            .where("category", "==", currentCategory)
            .orderBy("createdAt", "desc")
            .limit(limit);
    }

    if (lastDoc) ref = ref.startAfter(lastDoc);

    const snap = await ref.get();

    loading.style.display = "none";

    if (snap.empty) {
        if (!lastDoc) {
            postList.innerHTML = "<p style='text-align:center; color:#777;'>投稿がありません。</p>";
        }
        return;
    }

    lastDoc = snap.docs[snap.docs.length - 1];

    snap.docs.forEach(doc => {
        const p = doc.data();
        const id = doc.id;

        const card = document.createElement("div");
        card.className = "post-card";
        card.onclick = () => location.href = `post.html?id=${id}`;

        const img = document.createElement("img");
        img.className = "thumb";
        img.src = (p.thumbs && p.thumbs.length > 0)
            ? p.thumbs[0]
            : (p.images && p.images.length > 0 ? p.images[0] : "icons/noimage.png");

        const title = document.createElement("div");
        title.className = "title";
        title.textContent = p.title || "(タイトルなし)";

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = p.createdAt?.toDate
            ? p.createdAt.toDate().toLocaleString()
            : "日時不明";

        card.appendChild(img);
        card.appendChild(title);
        card.appendChild(meta);

        postList.appendChild(card);
    });

    isLoading = false;
}

/* 無限スクロール */
window.addEventListener("scroll", () => {
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
        loadPosts();
    }
});

/* 初回読み込み */
loadPosts();
</script>

</body>
</html>
