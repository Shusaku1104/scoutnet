<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - ホーム</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Firebase 8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }
        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
        }
        nav div:last-child {
            display:flex;
            gap:15px;
            overflow-x:auto;
            white-space: nowrap;
        }
        nav a, #categoryBtn {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
        }
        #categoryBtn {
            background:#2E7D32;
            color:white;
            padding:8px 14px;
            border-radius:8px;
            cursor:pointer;
            border:none;
        }
        #categoryMenu {
            position:absolute;
            left:20px;
            top:60px;
            background:white;
            border:2px solid #D7C4A3;
            border-radius:12px;
            box-shadow:0 4px 0 #D7C4A3;
            display:none;
            width:150px;
            pointer-events:none;
            z-index:200;
        }
        .category-item {
            padding:12px;
            cursor:pointer;
            border-bottom:1px solid #EEE;
        }
        .category-item:hover {
            background:#F1F8E9;
        }
        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }
        .post {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:16px;
            margin-bottom:20px;
            box-shadow:0 4px 0 #D7C4A3;
            cursor:pointer;
        }
        .post img {
            width:100%;
            border-radius:12px;
            margin-bottom:10px;
        }
        .category-tag {
            display:inline-block;
            background:#E8F5E9;
            color:#2E7D32;
            padding:4px 10px;
            border-radius:8px;
            font-size:13px;
            margin-bottom:6px;
            border:1px solid #A5D6A7;
        }
        .title {
            font-size:20px;
            font-weight:600;
            margin-bottom:8px;
        }
        .desc {
            font-size:15px;
            margin-bottom:10px;
        }
        #pager {
            text-align:center;
            margin:20px 0;
        }
        #pager button {
            padding:8px 14px;
            margin:0 10px;
            border-radius:8px;
            border:1px solid #A5D6A7;
            cursor:pointer;
        }
    </style>
</head>
<body>

<nav>
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div>
        <button id="categoryBtn">カテゴリ ▼</button>
        <a href="about.html">このサイトについて</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div id="categoryMenu">
    <div class="category-item" data-cat="すべて">すべて</div>
    <div class="category-item" data-cat="アウトドア">アウトドア</div>
    <div class="category-item" data-cat="インドア">インドア</div>
    <div class="category-item" data-cat="奉仕">奉仕</div>
</div>

<div class="container">
    <div id="postList"></div>
    <div id="pager">
        <button id="prevBtn" disabled>前へ</button>
        <button id="nextBtn" disabled>次へ</button>
    </div>
</div>

<script>
/* Firebase 設定 */
const firebaseConfig = {
  apiKey: "AIzaSyD121KvHW6Dtda16wFLOQ4IGOManS_bPl4",
  authDomain: "scoutnet12.firebaseapp.com",
  projectId: "scoutnet12",
  storageBucket: "scoutnet12.appspot.com",
  messagingSenderId: "572737738511",
  appId: "1:572737738511:web:36a6a477c7ec6b8db7507a"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* 🔥 永続化（これが無いと currentUser が読み込まれない） */
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

/* 🔥 ログイン確認（読み込み前の null で飛ばさない） */
auth.onAuthStateChanged(user => {
    console.log("home.html onAuthStateChanged:", user);

    if (user === null) {
        console.log("まだ読み込み中…");
        return;
    }

    if (!user) {
        location.href = "login.html";
    }
});

/* UI */
const postList = document.getElementById("postList");
const categoryBtn = document.getElementById("categoryBtn");
const categoryMenu = document.getElementById("categoryMenu");

let currentCategory = "すべて";
let lastDoc = null;
let firstDoc = null;
const perPage = 10;

/* カテゴリメニュー開閉 */
categoryBtn.addEventListener("click", () => {
    const isOpen = categoryMenu.style.display === "block";
    categoryMenu.style.display = isOpen ? "none" : "block";
    categoryMenu.style.pointerEvents = isOpen ? "none" : "auto";
});

/* カテゴリ選択 */
document.querySelectorAll(".category-item").forEach(item => {
    item.addEventListener("click", () => {
        currentCategory = item.dataset.cat;
        categoryMenu.style.display = "none";
        categoryMenu.style.pointerEvents = "none";
        lastDoc = null;
        firstDoc = null;
        loadPosts();
    });
});

/* 投稿読み込み */
async function loadPosts(direction = "none") {
    postList.innerHTML = "";

    let ref = db.collection("posts").orderBy("createdAt", "desc");

    if (currentCategory !== "すべて") {
        ref = ref.where("category", "==", currentCategory).orderBy("createdAt", "desc");
    }

    if (direction === "next" && lastDoc) {
        ref = ref.startAfter(lastDoc);
    }

    if (direction === "prev" && firstDoc) {
        ref = ref.endBefore(firstDoc);
    }

    const snap = await ref.limit(perPage).get();

    if (snap.empty) {
        postList.innerHTML = "<p>投稿がありません</p>";
        return;
    }

    firstDoc = snap.docs[0];
    lastDoc = snap.docs[snap.docs.length - 1];

    snap.docs.forEach(doc => {
        const post = doc.data();
        const id = doc.id;

        const div = document.createElement("div");
        div.className = "post";

        if (post.images && post.images.length > 0) {
            const img = document.createElement("img");
            img.src = post.images[0];
            div.appendChild(img);
        }

        const tag = document.createElement("div");
        tag.className = "category-tag";
        tag.textContent = post.category;
        div.appendChild(tag);

        const title = document.createElement("div");
        title.className = "title";
        title.textContent = post.title;

        const desc = document.createElement("div");
        desc.className = "desc";
        desc.textContent = post.description;

        div.appendChild(title);
        div.appendChild(desc);

        div.addEventListener("click", () => {
            location.href = "post.html?id=" + id;
        });

        postList.appendChild(div);
    });

    document.getElementById("prevBtn").disabled = !firstDoc;
    document.getElementById("nextBtn").disabled = snap.size < perPage;
}

document.getElementById("nextBtn").onclick = () => loadPosts("next");
document.getElementById("prevBtn").onclick = () => loadPosts("prev");

loadPosts();
</script>

</body>
</html>
