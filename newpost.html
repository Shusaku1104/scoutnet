<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - 投稿</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Firebase SDK v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }
        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
        }
        nav div:last-child {
            display:flex;
            gap:15px;
            overflow-x:auto;
            white-space: nowrap;
        }
        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
        }
        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }
        .form-box {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:20px;
            box-shadow:0 4px 0 #D7C4A3;
        }
        label {
            font-weight:600;
            margin-top:12px;
            display:block;
        }
        input, textarea, select {
            width:100%;
            padding:10px;
            margin-top:6px;
            border-radius:8px;
            border:1px solid #CCC;
            font-size:15px;
        }
        textarea {
            height:120px;
        }
        #postBtn {
            width:100%;
            background:#2E7D32;
            color:white;
            padding:12px;
            border:none;
            border-radius:10px;
            font-size:17px;
            font-weight:700;
            margin-top:20px;
            cursor:pointer;
            box-shadow:0 3px 0 #1B5E20;
        }
    </style>
</head>

<body>

<nav>
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div>
        <a href="home.html">ホーム</a>
        <a href="about.html">このサイトについて</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="container">
    <div class="form-box">

        <label>タイトル</label>
        <input type="text" id="title">

        <label>説明文</label>
        <textarea id="description"></textarea>

        <label>カテゴリ</label>
        <select id="category">
            <option value="アウトドア">アウトドア</option>
            <option value="インドア">インドア</option>
            <option value="奉仕">奉仕</option>
        </select>

        <label>画像（複数可）</label>
        <input type="file" id="images" accept="image/*" multiple>

        <label>その他ファイル（複数可）</label>
        <input type="file" id="files" multiple>

        <button id="postBtn">投稿する</button>
    </div>
</div>

<script>
/* Firebase 設定 */
const firebaseConfig = {
  apiKey: "AIzaSyD121KvHW6Dtda16wFLOQ4IGOManS_bPl4",
  authDomain: "scoutnet12.firebaseapp.com",
  projectId: "scoutnet12",
  storageBucket: "scoutnet12.appspot.com",
  messagingSenderId: "572737738511",
  appId: "1:572737738511:web:36a6a477c7ec6b8db7507a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

/* ログイン確認 */
const currentUser = localStorage.getItem("currentUser");
if (!currentUser) location.href = "login.html";

/* ランダムファイル名 */
const safeName = () => Math.random().toString(36).substring(2) + "_" + Date.now();

/* 投稿処理 */
document.getElementById("postBtn").addEventListener("click", async () => {

    const userRef = db.collection("users").doc(currentUser);
    const userSnap = await userRef.get();

    const postCount = userSnap.data().postCount || 0;

    if (postCount >= 190) {
        alert("投稿上限の190件に達しています！");
        return;
    }

    const title = document.getElementById("title").value.trim();
    const description = document.getElementById("description").value.trim();
    const category = document.getElementById("category").value;

    if (!title || !description) {
        alert("タイトルと説明文は必須です");
        return;
    }

    const imageFiles = document.getElementById("images").files;
    const otherFiles = document.getElementById("files").files;

    /* 画像アップロード */
    const uploadImageTasks = [...imageFiles].map(async (file) => {
        const fileRef = storage.ref(`posts/${safeName()}`);
        await fileRef.put(file);
        return await fileRef.getDownloadURL();
    });
    const imageURLs = await Promise.all(uploadImageTasks);

    /* その他ファイルアップロード */
    const uploadFileTasks = [...otherFiles].map(async (file) => {
        const fileRef = storage.ref(`posts/${safeName()}`);
        await fileRef.put(file);
        return await fileRef.getDownloadURL();
    });
    const fileURLs = await Promise.all(uploadFileTasks);

    /* Firestore に投稿を追加 */
    const postRef = await db.collection("posts").add({
        title,
        description,
        category,
        images: imageURLs,
        files: fileURLs,
        createdBy: currentUser,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    /* 投稿数を +1 */
    await userRef.update({
        postCount: firebase.firestore.FieldValue.increment(1)
    });

    /* 通知を全ユーザーに送信 */
    const usersSnap = await db.collection("users").get();
    const postId = postRef.id;

    usersSnap.forEach(u => {
        const uid = u.id;
        if (uid === currentUser) return;

        db.collection("notifications").add({
            to: uid,
            from: currentUser,
            type: "newpost",
            postId,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
    });

    alert("投稿しました！");
    location.href = "home.html";
});
</script>

</body>
</html>
