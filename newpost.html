<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>新規投稿</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
</head>

<body>
    <h1>新規投稿</h1>

    <label>タイトル</label><br>
    <input type="text" id="title"><br><br>

    <label>説明文</label><br>
    <textarea id="description"></textarea><br><br>

    <label>カテゴリ</label><br>
    <select id="category">
        <option value="アウトドア">アウトドア</option>
        <option value="インドア">インドア</option>
        <option value="奉仕">奉仕</option>
    </select><br><br>

    <label>画像</label><br>
    <input type="file" id="images" accept="image/*" multiple><br><br>

    <label>その他ファイル</label><br>
    <input type="file" id="files" multiple><br><br>

    <button id="postBtn">投稿する</button>

    <!-- 周作の JavaScript -->
    <script>
    /* Firebase 設定（ScoutNet12 の値に差し替え） */
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "scoutnet12.firebaseapp.com",
        projectId: "scoutnet12",
        storageBucket: "scoutnet12.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    /* ログイン確認 */
    const currentUser = localStorage.getItem("currentUser");
    if (!currentUser) location.href = "login.html";

    /* 投稿処理 */
    document.getElementById("postBtn").addEventListener("click", async () => {
        const title = document.getElementById("title").value.trim();
        const description = document.getElementById("description").value.trim();
        const category = document.getElementById("category").value;

        if (!title || !description) {
            alert("タイトルと説明文は必須です");
            return;
        }

        const imageFiles = document.getElementById("images").files;
        const otherFiles = document.getElementById("files").files;

        const imageURLs = [];
        const fileURLs = [];

        const uniqueId = () => Math.random().toString(36).substring(2) + Date.now();

        for (let file of imageFiles) {
            const fileRef = storage.ref(`posts/${uniqueId()}_${file.name}`);
            await fileRef.put(file);
            const url = await fileRef.getDownloadURL();
            imageURLs.push(url);
        }

        for (let file of otherFiles) {
            const fileRef = storage.ref(`posts/${uniqueId()}_${file.name}`);
            await fileRef.put(file);
            const url = await fileRef.getDownloadURL();
            fileURLs.push(url);
        }

        const postRef = await db.collection("posts").add({
            title,
            description,
            category,
            images: imageURLs,
            files: fileURLs,
            createdBy: currentUser,
            createdAt: Date.now()
        });

        const usersSnap = await db.collection("users").get();
        const postId = postRef.id;

        usersSnap.forEach(u => {
            const uid = u.id;
            if (uid === currentUser) return;

            db.collection("notifications").add({
                to: uid,
                from: currentUser,
                type: "newpost",
                postId,
                createdAt: Date.now()
            });
        });

        alert("投稿しました！");
        location.href = "home.html";
    });
    </script>

</body>
</html>
