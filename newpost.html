<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - 投稿</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Firebase SDK v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }

        /* スライド式タブ */
        nav {
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
            padding:10px;
        }

        nav .tab-scroll {
            display:flex;
            overflow-x:auto;
            white-space:nowrap;
            gap:15px;
        }

        nav .tab-scroll::-webkit-scrollbar {
            display:none;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
            padding:8px 4px;
            display:inline-block;
        }

        /* 選択中タブ（緑） */
        nav a.active {
            color:#2E7D32;
            border-bottom:3px solid #2E7D32;
        }

        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }

        .form-box {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:20px;
            box-shadow:0 4px 0 #D7C4A3;
        }

        label {
            font-weight:600;
            margin-top:12px;
            display:block;
        }

        input, textarea, select {
            width:100%;
            padding:10px;
            margin-top:6px;
            border-radius:8px;
            border:1px solid #CCC;
            font-size:15px;
        }

        textarea {
            height:120px;
        }

        #postBtn {
            width:100%;
            background:#2E7D32;
            color:white;
            padding:12px;
            border:none;
            border-radius:10px;
            font-size:17px;
            font-weight:700;
            margin-top:20px;
            cursor:pointer;
            box-shadow:0 3px 0 #1B5E20;
            transition:0.1s;
        }

        #postBtn:active {
            transform: scale(0.97);
            opacity: 0.8;
        }

        #loading {
            display:none;
            text-align:center;
            margin-top:20px;
            font-size:16px;
            color:#777;
        }
    </style>
</head>

<body>

<nav>
    <div class="tab-scroll">
        <a href="home.html">ホーム</a>
        <a href="about.html">このサイトについて</a>
        <a href="newpost.html" class="active">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="container">
    <div class="form-box">

        <label>タイトル</label>
        <input type="text" id="title">

        <label>説明文</label>
        <textarea id="description"></textarea>

        <label>カテゴリ</label>
        <select id="category">
            <option value="アウトドア">アウトドア</option>
            <option value="インドア">インドア</option>
            <option value="奉仕">奉仕</option>
        </select>

        <label>画像（複数可）</label>
        <input type="file" id="images" accept="image/*" multiple>

        <label>その他ファイル（複数可）</label>
        <input type="file" id="files" multiple accept=".doc,.docx,.pdf,.txt,.zip,.ppt,.pptx,.xls,.xlsx">

        <button id="postBtn">投稿する</button>

        <div id="loading">投稿中… 少しお待ちください</div>
    </div>
</div>

<script>
/* ポップアップ */
function showPopup(message) {
    const msg = document.createElement("div");
    msg.style.position = "fixed";
    msg.style.top = "50%";
    msg.style.left = "50%";
    msg.style.transform = "translate(-50%, -50%)";
    msg.style.background = "white";
    msg.style.padding = "20px 30px";
    msg.style.borderRadius = "12px";
    msg.style.boxShadow = "0 4px 10px rgba(0,0,0,0.2)";
    msg.style.fontSize = "20px";
    msg.style.fontWeight = "700";
    msg.style.color = "#2E7D32";
    msg.style.zIndex = "9999";
    msg.innerText = message;

    document.body.appendChild(msg);
    setTimeout(() => msg.remove(), 1500);
}

/* Firebase 設定 */
const firebaseConfig = {
  apiKey: "AIzaSyD121KvHW6Dtda16wFLOQ4IGOManS_bPl4",
  authDomain: "scoutnet12.firebaseapp.com",
  projectId: "scoutnet12",
  storageBucket: "scoutnet12.firebasestorage.app",
  messagingSenderId: "572737738511",
  appId: "1:572737738511:web:36a6a477c7ec6b8db7507a"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let currentUser = null;

/* ログイン確認 */
auth.onAuthStateChanged(user => {
    if (!user) {
        location.href = "login.html";
        return;
    }
    currentUser = user.uid;
});

/* ランダムファイル名 */
const safeName = () => Math.random().toString(36).substring(2) + "_" + Date.now();

/* 投稿処理 */
document.getElementById("postBtn").addEventListener("click", async () => {

    if (!currentUser) {
        showPopup("ログイン情報を確認中です");
        return;
    }

    const btn = document.getElementById("postBtn");
    const loading = document.getElementById("loading");

    const title = document.getElementById("title").value.trim();
    const description = document.getElementById("description").value.trim();
    const category = document.getElementById("category").value;

    if (!title || !description) {
        showPopup("タイトルと説明文は必須です");
        return;
    }

    btn.disabled = true;
    btn.textContent = "投稿中…";
    loading.style.display = "block";

    const imageFiles = document.getElementById("images").files;
    const otherFiles = document.getElementById("files").files;

    /* 画像アップロード */
    const uploadImageTasks = [...imageFiles].map(async (file) => {
        const fileRef = storage.ref(`posts/${safeName()}`);
        await fileRef.put(file);
        return await fileRef.getDownloadURL();
    });
    const imageURLs = await Promise.all(uploadImageTasks);

    /* その他ファイルアップロード */
    const uploadFileTasks = [...otherFiles].map(async (file) => {
        const fileRef = storage.ref(`posts/${safeName()}`);
        await fileRef.put(file);
        return await fileRef.getDownloadURL();
    });
    const fileURLs = await Promise.all(uploadFileTasks);

    /* Firestore に投稿を追加 */
    await db.collection("posts").add({
        title,
        description,
        category,
        images: imageURLs,
        files: fileURLs,
        createdBy: currentUser,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    /* 投稿数 +1 */
    await db.collection("users").doc(currentUser).update({
        postCount: firebase.firestore.FieldValue.increment(1)
    });

    showPopup("投稿が完了しました！");

    setTimeout(() => {
        location.href = "home.html";
    }, 1500);
});
</script>

</body>
</html>
