<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規投稿 - ScoutNet</title>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background: #f5f5f5;
            padding: 20px;
            max-width: 700px;
            margin: auto;
            color: #4E342E;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #ffffff;
            border-bottom: 2px solid #D7C4A3;
            position: sticky;
            top: 0;
            z-index: 100;
            margin: -20px -20px 20px -20px;
        }

        nav a {
            color: #4E342E;
            text-decoration: none;
            font-weight: 600;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 1.4rem;
        }

        .input, .textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #D7C4A3;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1rem;
            background: #fff;
        }

        #preview img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #1B5E20;
        }

        .submit-btn:hover {
            background: #27682B;
        }

        .genre {
            margin-bottom: 20px;
            font-size: 1rem;
        }

        .genre label {
            margin-right: 20px;
        }
    </style>
</head>
<body>

<nav>
    <div style="font-size:1.3rem; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div style="display:flex; gap:18px; font-weight:600;">
        <a href="home.html">ホーム</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<h2>新規投稿</h2>

<form id="postForm">

    <input id="images" type="file" accept="image/*" multiple>
    <div id="preview"></div>

    <input type="text" id="title" class="input" placeholder="タイトル">
    <input type="text" id="description" class="input" placeholder="説明">
    <textarea id="content" class="textarea" rows="10" placeholder="本文を書く…"></textarea>

    <div class="genre">
        <label><input type="radio" name="genre" value="indoor"> インドア</label>
        <label><input type="radio" name="genre" value="outdoor"> アウトドア</label>
    </div>

    <button type="submit" class="submit-btn">投稿する</button>

</form>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
    apiKey: "YOUR_REAL_API_KEY",
    authDomain: "scoutnet-3ccb1.firebaseapp.com",
    projectId: "scoutnet-3ccb1",
    storageBucket: "scoutnet-3ccb1.firebasestorage.app",
    messagingSenderId: "619869604171",
    appId: "1:619869604171:web:7ba88ab8eb9a0bff0ec0ce"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();
const auth = firebase.auth();

// 🔥 ログイン必須
let currentUser = null;
auth.onAuthStateChanged(user => {
    if (!user) {
        location.href = "login.html";
        return;
    }
    currentUser = user;
});

// 🔥 プレビュー
document.getElementById("images").addEventListener("change", () => {
    const preview = document.getElementById("preview");
    preview.innerHTML = "";

    Array.from(images.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = () => {
            const img = document.createElement("img");
            img.src = reader.result;
            preview.appendChild(img);
        };
        reader.readAsDataURL(file);
    });
});

// 🔥 投稿処理
document.getElementById("postForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    if (!currentUser) {
        alert("ログインしてください");
        return;
    }

    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;
    const content = document.getElementById("content").value;
    const genre = document.querySelector("input[name='genre']:checked")?.value;

    if (!genre) {
        alert("ジャンルを選んでください");
        return;
    }

    const files = document.getElementById("images").files;
    const imageUrls = [];

    // 🔥 画像アップロード
    for (let file of files) {
        const ref = storage.ref("posts/" + Date.now() + "_" + file.name);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        imageUrls.push(url);
    }

    // 🔥 Firestore に保存
    await db.collection("posts").add({
        title,
        description,
        content,
        genre,
        images: imageUrls,
        userId: currentUser.uid,
        userName: currentUser.email,
        createdAt: new Date(),
        likes: []
    });

    alert("投稿しました！");
    location.href = "home.html";  // ← 投稿後はホームへ
});
</script>

</body>
</html>
