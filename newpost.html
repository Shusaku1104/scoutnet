<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - 投稿</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Firebase SDK v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }

        nav {
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
            padding:10px;
        }

        nav .tab-scroll {
            display:flex;
            overflow-x:auto;
            white-space:nowrap;
            gap:15px;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
            padding:8px 4px;
        }

        nav a.active {
            color:#2E7D32;
            border-bottom:3px solid #2E7D32;
        }

        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }

        .form-box {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:20px;
            box-shadow:0 4px 0 #D7C4A3;
        }

        label {
            font-weight:600;
            margin-top:12px;
            display:block;
        }

        input, textarea, select {
            width:100%;
            padding:10px;
            margin-top:6px;
            border-radius:8px;
            border:1px solid #CCC;
            font-size:15px;
        }

        textarea {
            height:120px;
        }

        #postBtn {
            width:100%;
            background:#2E7D32;
            color:white;
            padding:12px;
            border:none;
            border-radius:10px;
            font-size:17px;
            font-weight:700;
            margin-top:20px;
            cursor:pointer;
            box-shadow:0 3px 0 #1B5E20;
        }

        #loading {
            display:none;
            text-align:center;
            margin-top:20px;
            font-size:16px;
            color:#777;
        }

        /* ▼ 画像プレビュー ▼ */
        #previewArea {
            margin-top:10px;
            display:flex;
            flex-wrap:wrap;
            gap:10px;
        }

        .preview-box {
            position:relative;
            width:100px;
            height:100px;
            border-radius:10px;
            overflow:hidden;
            border:2px solid #D7C4A3;
        }

        .preview-box img {
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .delete-btn {
            position:absolute;
            top:3px;
            right:3px;
            background:rgba(0,0,0,0.6);
            color:white;
            border:none;
            border-radius:50%;
            width:22px;
            height:22px;
            font-size:14px;
            cursor:pointer;
        }

        /* プログレスバー */
        #progressContainer {
            display:none;
            margin-top:15px;
        }

        #progressBar {
            width:100%;
            height:10px;
            background:#ddd;
            border-radius:5px;
            overflow:hidden;
        }

        #progressFill {
            width:0%;
            height:100%;
            background:#2E7D32;
            transition:0.2s;
        }
    </style>
</head>

<body>

<nav>
    <div class="tab-scroll">
        <a href="home.html">ホーム</a>
        <a href="about.html">このサイトについて</a>
        <a href="newpost.html" class="active">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="container">
    <div class="form-box">

        <label>タイトル</label>
        <input type="text" id="title">

        <label>説明文</label>
        <textarea id="description"></textarea>

        <label>カテゴリ</label>
        <select id="category">
            <option value="アウトドア">アウトドア</option>
            <option value="インドア">インドア</option>
            <option value="奉仕">奉仕</option>
        </select>

        <label>画像（複数可）</label>
        <input type="file" id="images" accept="image/*" multiple>

        <div id="previewArea"></div>

        <label>その他ファイル（複数可）</label>
        <input type="file" id="files" multiple>

        <button id="postBtn">投稿する</button>

        <div id="loading">投稿中… 少しお待ちください</div>

        <div id="progressContainer">
            <div id="progressBar">
                <div id="progressFill"></div>
            </div>
        </div>

    </div>
</div>

<script>
/* ポップアップ */
function showPopup(message) {
    const msg = document.createElement("div");
    msg.style.position = "fixed";
    msg.style.top = "50%";
    msg.style.left = "50%";
    msg.style.transform = "translate(-50%, -50%)";
    msg.style.background = "white";
    msg.style.padding = "20px 30px";
    msg.style.borderRadius = "12px";
    msg.style.boxShadow = "0 4px 10px rgba(0,0,0,0.2)";
    msg.style.fontSize = "20px";
    msg.style.fontWeight = "700";
    msg.style.color = "#2E7D32";
    msg.style.zIndex = "9999";
    msg.innerText = message;

    document.body.appendChild(msg);
    setTimeout(() => msg.remove(), 1500);
}

/* Firebase 設定 */
const firebaseConfig = {
  apiKey: "AIzaSyD121KvHW6Dtda16wFLOQ4IGOManS_bPl4",
  authDomain: "scoutnet12.firebaseapp.com",
  projectId: "scoutnet12",
  storageBucket: "scoutnet12.firebasestorage.app",
  messagingSenderId: "572737738511",
  appId: "1:572737738511:web:36a6a477c7ec6b8db7507a"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let currentUser = null;

/* ログイン確認 */
auth.onAuthStateChanged(user => {
    if (!user) {
        location.href = "login.html";
        return;
    }
    currentUser = user.uid;
});

/* ランダムファイル名 */
const safeName = () => Math.random().toString(36).substring(2) + "_" + Date.now();

/* ▼ 画像圧縮関数 ▼ */
function compressImage(file, maxSize = 800) {
    return new Promise((resolve) => {
        const img = new Image();
        const reader = new FileReader();

        reader.onload = (e) => {
            img.src = e.target.result;
        };

        img.onload = () => {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            const scale = maxSize / Math.max(img.width, img.height);
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;

            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            canvas.toBlob((blob) => {
                resolve(blob);
            }, "image/jpeg", 0.8);
        };

        reader.readAsDataURL(file);
    });
}

/* ▼ 画像プレビュー（削除ボタンつき） ▼ */
let selectedImages = [];

document.getElementById("images").addEventListener("change", (e) => {
    const files = [...e.target.files];
    selectedImages.push(...files);

    renderPreview();
});

function renderPreview() {
    const area = document.getElementById("previewArea");
    area.innerHTML = "";

    selectedImages.forEach((file, index) => {
        const box = document.createElement("div");
        box.className = "preview-box";

        const img = document.createElement("img");
        img.src = URL.createObjectURL(file);

        const del = document.createElement("button");
        del.className = "delete-btn";
        del.textContent = "×";
        del.onclick = () => {
            selectedImages.splice(index, 1);
            renderPreview();
        };

        box.appendChild(img);
        box.appendChild(del);
        area.appendChild(box);
    });
}

/* ▼ 投稿処理 ▼ */
document.getElementById("postBtn").addEventListener("click", async () => {

    if (!currentUser) {
        showPopup("ログイン情報を確認中です");
        return;
    }

    const btn = document.getElementById("postBtn");
    const loading = document.getElementById("loading");
    const progressContainer = document.getElementById("progressContainer");
    const progressFill = document.getElementById("progressFill");

    const title = document.getElementById("title").value.trim();
    const description = document.getElementById("description").value.trim();
    const category = document.getElementById("category").value;

    if (!title || !description) {
        showPopup("タイトルと説明文は必須です");
        return;
    }

    btn.disabled = true;
    btn.textContent = "投稿中…";
    loading.style.display = "block";
    progressContainer.style.display = "block";

    /* ▼ 画像アップロード（圧縮＋進行バー） ▼ */
    let uploadedCount = 0;

    const uploadImageTasks = selectedImages.map(async (file) => {
        const compressed = await compressImage(file);

        const fileRef = storage.ref(`posts/${safeName()}`);
        await fileRef.put(compressed);

        uploadedCount++;
        progressFill.style.width = `${(uploadedCount / selectedImages.length) * 100}%`;

        return await fileRef.getDownloadURL();
    });

    const imageURLs = await Promise.all(uploadImageTasks);

    /* その他ファイルアップロード */
    const otherFiles = document.getElementById("files").files;
    const uploadFileTasks = [...otherFiles].map(async (file) => {
        const fileRef = storage.ref(`posts/${safeName()}`);
        await fileRef.put(file);
        return await fileRef.getDownloadURL();
    });
    const fileURLs = await Promise.all(uploadFileTasks);

    /* Firestore に投稿を追加 */
    await db.collection("posts").add({
        title,
        description,
        category,
        images: imageURLs,
        files: fileURLs,
        createdBy: currentUser,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    /* 投稿数 +1 */
    await db.collection("users").doc(currentUser).update({
        postCount: firebase.firestore.FieldValue.increment(1)
    });

    showPopup("投稿が完了しました！");

    setTimeout(() => {
        location.href = "home.html";
    }, 1500);
});
</script>

</body>
</html>
