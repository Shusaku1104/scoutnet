<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>新規投稿</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: sans-serif;
            background: #fff;
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }

        h2 {
            margin-bottom: 20px;
        }

        .input, .textarea {
            width: 100%;
            padding: 10px;
            border: none;
            border-bottom: 1px solid #ccc;
            margin-bottom: 20px;
            font-size: 16px;
            outline: none;
        }

        #preview img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #1976D2;
        }
    </style>
</head>
<body>

<nav style="
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 20px;
    background:#ffffff;
    border-bottom:2px solid #D7C4A3;
    position:sticky;
    top:0;
    z-index:100;
">
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div style="display:flex; gap:18px; font-size:15px; font-weight:600;">
        <a href="index.html" style="color:#4E342E; text-decoration:none;">ホーム</a>
        <a href="newpost.html" style="color:#4E342E; text-decoration:none;">投稿する</a>
        <a href="profile.html" style="color:#4E342E; text-decoration:none;">プロフィール</a>
        <a href="notifications.html" style="color:#4E342E; text-decoration:none;">🔔 通知</a>
    </div>
</nav>

<h2>新規投稿</h2>

<form id="postForm">

    <input id="images" type="file" accept="image/*" multiple>
    <div id="preview"></div>

    <input type="text" id="title" class="input" placeholder="タイトル">
    <input type="text" id="description" class="input" placeholder="説明">
    <textarea id="content" class="textarea" rows="10" placeholder="本文を書く…"></textarea>

    <div class="genre">
        <label><input type="radio" name="genre" value="indoor"> インドア</label>
        <label><input type="radio" name="genre" value="outdoor"> アウトドア</label>
    </div>

    <button type="submit" class="submit-btn">投稿する</button>

</form>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDrvBB4R30sV_AhzzpJY9_d5x0biDp8uyA",
    authDomain: "scoutnet-3ccb1.firebaseapp.com",
    projectId: "scoutnet-3ccb1",
    storageBucket: "scoutnet-3ccb1.firebasestorage.app",
    messagingSenderId: "619869604171",
    appId: "1:619869604171:web:7ba88ab8eb9a0bff0ec0ce"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();
const auth = firebase.auth();

// 🔥 Firebase Auth でログインユーザーを取得
let currentUser = null;
auth.onAuthStateChanged(user => {
    currentUser = user;
});

// プレビュー
document.getElementById("images").addEventListener("change", () => {
    const preview = document.getElementById("preview");
    preview.innerHTML = "";

    Array.from(images.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = () => {
            const img = document.createElement("img");
            img.src = reader.result;
            preview.appendChild(img);
        };
        reader.readAsDataURL(file);
    });
});

// 投稿処理
document.getElementById("postForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    if (!currentUser) {
        alert("ログインしてください");
        return;
    }

    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;
    const content = document.getElementById("content").value;
    const genre = document.querySelector("input[name='genre']:checked")?.value;

    if (!genre) {
        alert("ジャンルを選んでください");
        return;
    }

    const files = document.getElementById("images").files;
    const imageUrls = [];

    // 画像アップロード
    for (let file of files) {
        const ref = storage.ref("posts/" + Date.now() + "_" + file.name);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        imageUrls.push(url);
    }

    // Firestore に保存
    await db.collection("posts").add({
        title,
        description,
        content,
        genre,
        images: imageUrls,
        userId: currentUser.uid,
        userName: currentUser.email,
        createdAt: new Date()
    });

    alert("投稿しました！");
    location.href = "index.html";
});
</script>

</body>
</html>
