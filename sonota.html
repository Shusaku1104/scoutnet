<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - その他</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Firebase 8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0 0 80px;
            color:#4E342E;
        }

        /* 上ナビバー */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 200;
            background: white;
            padding: 14px 18px;
            border-bottom: 2px solid #D7C4A3;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .top-nav img { height: 28px; }
        .top-nav-title {
            font-size: 20px;
            font-weight: 700;
        }

        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }

        /* 投稿カード */
        .post-card {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:12px;
            box-shadow:0 4px 0 #D7C4A3;
            margin-bottom:18px;
            cursor:pointer;
        }

        .thumb {
            width:100%;
            height:200px;
            object-fit:cover;
            border-radius:12px;
            background:#ddd;
        }

        .title {
            font-size:18px;
            font-weight:700;
            margin-top:10px;
        }

        .meta {
            font-size:13px;
            color:#777;
            margin-top:4px;
        }

        /* ローディング */
        #loading {
            text-align:center;
            padding:20px;
            color:#777;
        }

        /* 下タブ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: white;
            border-top: 2px solid #D7C4A3;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -3px 0 #D7C4A3;
            z-index: 999;
        }
        .bottom-nav a {
            text-decoration: none;
            color: #4E342E;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }
        .bottom-nav img {
            width: 26px;
            height: 26px;
        }
    </style>
</head>

<body>

<!-- 上ナビバー -->
<div class="top-nav">
    <img src="icons/logo.png">
    <div class="top-nav-title">その他</div>
</div>

<div class="container" id="postList">
    <p id="loading">読み込み中…</p>
</div>

<!-- 下タブ -->
<div class="bottom-nav">
    <a href="home.html">
        <img src="icons/home.png"><br>ホーム
    </a>
    <a href="newpost.html">
        <img src="icons/add.png"><br>投稿
    </a>
    <a href="profile.html">
        <img src="icons/user.png"><br>プロフィール
    </a>
</div>

<script>
/* Firebase 設定 */
const firebaseConfig = {
  apiKey: "AIzaSyD121KvHW6Dtda16wFLOQ4IGOManS_bPl4",
  authDomain: "scoutnet12.firebaseapp.com",
  projectId: "scoutnet12",
  storageBucket: "scoutnet12.firebasestorage.app",
  messagingSenderId: "572737738511",
  appId: "1:572737738511:web:36a6a477c7ec6b8db7507a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* UI */
const postList = document.getElementById("postList");
const loading = document.getElementById("loading");

/* 無限スクロール用 */
let lastDoc = null;
let isLoading = false;
const limit = 8;

/* 投稿を読み込む */
async function loadPosts() {
    if (isLoading) return;
    isLoading = true;

    loading.style.display = "block";

    let ref = db.collection("posts")
        .where("category", "==", "その他")
        .orderBy("createdAt", "desc")
        .limit(limit);

    if (lastDoc) ref = ref.startAfter(lastDoc);

    const snap = await ref.get();

    loading.style.display = "none";

    if (snap.empty) {
        if (!lastDoc) {
            postList.innerHTML = "<p style='text-align:center; color:#777;'>まだ投稿がありません。</p>";
        }
        return;
    }

    lastDoc = snap.docs[snap.docs.length - 1];

    snap.docs.forEach(doc => {
        const p = doc.data();
        const id = doc.id;

        const card = document.createElement("div");
        card.className = "post-card";
        card.onclick = () => location.href = `post.html?id=${id}`;

        /* サムネイル優先 */
        const img = document.createElement("img");
        img.className = "thumb";
        img.src = (p.thumbs && p.thumbs.length > 0)
            ? p.thumbs[0]
            : (p.images && p.images.length > 0 ? p.images[0] : "icons/noimage.png");

        const title = document.createElement("div");
        title.className = "title";
        title.textContent = p.title || "(タイトルなし)";

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = p.createdAt?.toDate
            ? p.createdAt.toDate().toLocaleString()
            : "日時不明";

        card.appendChild(img);
        card.appendChild(title);
        card.appendChild(meta);

        postList.appendChild(card);
    });

    isLoading = false;
}

/* スクロール監視（無限スクロール） */
window.addEventListener("scroll", () => {
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
        loadPosts();
    }
});

/* 初回読み込み */
loadPosts();
</script>

</body>
</html>
