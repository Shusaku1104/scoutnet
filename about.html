    <h2>ScoutNet について</h2>

    <div class="box">
        <p><strong>ScoutNet</strong> は、ユーザーがアカウントを作成し、ログインして利用できるコミュニティサイトです。</p>

        <p>このサイトでは、以下のようなことができます：</p>

        <ul>
            <li>アカウントを作成してログイン</li>
            <li>ログイン後にホーム画面へアクセス</li>
            <li>今後、プロフィール機能や投稿機能などを追加予定</li>
        </ul>

        <p>ScoutNet はまだ開発中ですが、これからどんどん機能を増やしていく予定です。</p>

        <p>トップページへ戻る → <a href="index.html">ログインページへ</a></p>
