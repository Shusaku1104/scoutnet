<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoutNet について</title>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
            color: #4E342E;
        }

        /* ナビバー */
        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
        }

        nav div:last-child {
            display:flex;
            gap:15px;
            overflow-x:auto;
            -webkit-overflow-scrolling: touch;
            white-space: nowrap;
            min-width: max-content;
            padding-right:10px;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
            transition:0.1s;
        }
        nav a:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        .container {
            padding:30px 20px;
            text-align:center;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid #D7C4A3;
            width: 85%;
            max-width: 500px;
            margin: 30px auto;
            box-shadow: 0 4px 0 #D7C4A3;
            text-align: left;
        }

        h2 {
            color: #2E7D32;
            font-weight: 700;
            text-align: center;
        }

        p, li {
            line-height: 1.7;
        }

        a {
            color: #2E7D32;
            font-weight: bold;
        }
    </style>
</head>
<body>

<!-- ナビバー -->
<nav>
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div>
        <a href="home.html">ホーム</a>
        <a href="about.html">このサイトについて</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="container">
    <h2>ScoutNet について</h2>

    <div class="box">
        <p>
            <strong>ScoutNet</strong> は、ベンチャースカウトが活動計画を立てるときに役立つアイデアを共有するためのサイトです。
        </p>

        <p>
            アウトドアのルートや宿泊方法、インドアの奉仕活動など、実際に行われた活動を投稿として見られるようにし、
            計画に悩んだときの参考にできます。
        </p>

        <p>
            コメントや通知などの機能を通して交流もでき、スカウト同士で活動のヒントを集められる場を目指しています。
        </p>
    </div>
</div>

</body>
</html>
