    <div class="box">
        <p>
            <strong>ScoutNet</strong> は、ベンチャースカウトが活動計画を立てるときに役立つアイデアを共有するためのサイトです。
        </p>

        <p>
            アウトドアのルートや宿泊方法、インドアの奉仕活動など、実際に行われた活動を投稿として見られるようにし、
            計画に悩んだときの参考にできます。
