<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoutNet について</title>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0 0 80px; /* 下タブの高さ確保 */
            color: #4E342E;
        }

        /* 上ナビバー（ロゴ固定） */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 200;
            background: white;
            padding: 14px 18px;
            border-bottom: 2px solid #D7C4A3;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .top-nav img {
            height: 28px;
        }
        .top-nav-title {
            font-size: 20px;
            font-weight: 700;
        }

        /* スライド式タブ */
        nav {
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:56px;
            z-index:150;
            padding:10px;
        }
        nav .tab-scroll {
            display:flex;
            overflow-x:auto;
            white-space:nowrap;
            gap:15px;
        }
        nav .tab-scroll::-webkit-scrollbar {
            display:none;
        }
        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
            padding:8px 4px;
            display:inline-block;
        }
        nav a.active {
            color:#2E7D32;
            border-bottom:3px solid #2E7D32;
        }

        /* 本文 */
        .container {
            padding:30px 20px;
            text-align:center;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid #D7C4A3;
            width: 85%;
            max-width: 500px;
            margin: 30px auto;
            box-shadow: 0 4px 0 #D7C4A3;
            text-align: left;
        }

        h2 {
            color: #2E7D32;
            font-weight: 700;
            text-align: center;
        }

        p, li {
            line-height: 1.7;
        }

        a {
            color: #2E7D32;
            font-weight: bold;
        }

        /* 下タブ（インスタ風） */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: white;
            border-top: 2px solid #D7C4A3;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -3px 0 #D7C4A3;
            z-index: 999;
        }
        .bottom-nav a {
            text-decoration: none;
            color: #4E342E;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }
        .bottom-nav img {
            width: 26px;
            height: 26px;
        }
    </style>
</head>
<body>

<!-- 上ナビバー -->
<div class="top-nav">
    <img src="icons/logo.png">
    <div class="top-nav-title">ScoutNet</div>
</div>

<!-- スライド式タブ -->
<nav>
    <div class="tab-scroll">
        <a href="home.html">ホーム</a>
        <a href="about.html" class="active">このサイトについて</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="container">
    <h2>ScoutNet について</h2>

    <div class="box">
        <p>
            <strong>ScoutNet</strong> は、ベンチャースカウトが活動計画を立てるときに役立つアイデアを共有するためのサイトです。
        </p>

        <p>
            アウトドアのルートや宿泊方法、インドアの奉仕活動など、実際に行われた活動を投稿として見られるようにし、
            計画に悩んだときの参考にできます。
        </p>

        <p>
            コメントや通知などの機能を通して交流もでき、スカウト同士で活動のヒントを集められる場を目指しています。
        </p>
    </div>
</div>

<div class="bottom-nav">

    </a>

    </a>
    <a href="profile.html">
        <img src="icons/user.png"><br>プロフィール
    </a>
</div>

</body>
</html>
