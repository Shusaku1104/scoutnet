            align-items:center;
            justify-content:center;
            text-align:center;
            padding:5px;
            font-size:14px;
            font-weight:700;
            color:#4E342E;
            background:white;
        }
    </style>

<script>
/* Firebase 設定 */
const firebaseConfig = {
  apiKey: "AIzaSyD121KvHW6Dtda16wFLOQ4IGOManS_bPl4",
  authDomain: "scoutnet12.firebaseapp.com",
  projectId: "scoutnet12",
  storageBucket: "scoutnet12.firebasestorage.app",
  messagingSenderId: "572737738511",
  appId: "1:572737738511:web:36a6a477c7ec6b8db7507a"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

/* ▼ 画像圧縮関数（アイコン用：400px） ▼ */
function compressImage(file, maxSize = 400) {
    return new Promise((resolve) => {
        const img = new Image();
        const reader = new FileReader();

        reader.onload = (e) => {
            img.src = e.target.result;
        };

        img.onload = () => {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            const scale = maxSize / Math.max(img.width, img.height);
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;

            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            canvas.toBlob((blob) => {
                resolve(blob);
            }, "image/jpeg", 0.8);
        };

        reader.readAsDataURL(file);
    });
}

/* URL の uid を取得 */
const params = new URLSearchParams(location.search);
const viewUid = params.get("uid");

let currentUser = null;

/* ▼ 投稿一覧を読み込む（サムネイル対応） ▼ */
async function loadUserPosts(uid) {
    const postsRef = db.collection("posts")
        .where("createdBy", "==", uid)
        .orderBy("createdAt", "desc");

    const snap = await postsRef.get();
    const list = document.getElementById("userPosts");
    list.innerHTML = "";

    if (snap.empty) {
        list.innerHTML = "<p>投稿はありません。</p>";
        return;
    }

    snap.forEach(doc => {
        const p = doc.data();

        const item = document.createElement("div");
        item.className = "post-item";

        /* ▼ サムネイル優先で読み込む ▼ */
        let thumbUrl = null;

        if (p.thumbs && p.thumbs.length > 0) {
            thumbUrl = p.thumbs[0]; // 200px サムネイル
        } else if (p.images && p.images.length > 0) {
            thumbUrl = p.images[0]; // fallback
        }

        if (thumbUrl) {
            const img = document.createElement("img");
            img.src = thumbUrl;
            img.loading = "lazy"; // 遅延読み込み
            img.className = "post-thumb";
            item.appendChild(img);
        } else {
            const box = document.createElement("div");
            box.className = "post-title-box";
            box.textContent = p.title || "(タイトルなし)";
            item.appendChild(box);
        }

        item.onclick = () => {
            location.href = `post.html?id=${doc.id}`;
        };

        list.appendChild(item);
    });
}

/* ▼ プロフィール読み込み ▼ */
auth.onAuthStateChanged(async (user) => {
    if (!user) {
        location.href = "login.html";
        return;
    }

    currentUser = user.uid;
    const targetUid = viewUid || currentUser;

    const ref = db.collection("users").doc(targetUid);
    const snap = await ref.get();

    if (snap.exists) {
        const data = snap.data();

        document.getElementById("nameInput").value = data.name || "";
        document.getElementById("groupInput").value = data.group || "";
        document.getElementById("prefInput").value = data.pref || "";
        document.getElementById("bioInput").value = data.bio || "";

        if (data.iconUrl) {
            document.getElementById("iconPreview").src = data.iconUrl;
        }
    }

    /* 他人のプロフィールなら編集不可 */
    if (viewUid && viewUid !== currentUser) {
        document.getElementById("profileTitle").textContent = "プロフィール（閲覧）";

        document.getElementById("iconInput").style.display = "none";
        document.getElementById("saveBtn").style.display = "none";

        document.getElementById("nameInput").disabled = true;
        document.getElementById("groupInput").disabled = true;
        document.getElementById("prefInput").disabled = true;
        document.getElementById("bioInput").disabled = true;
    }

    /* 投稿一覧を読み込む */
    loadUserPosts(targetUid);
});

/* アイコンプレビュー */
document.getElementById("iconInput").onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
        document.getElementById("iconPreview").src = URL.createObjectURL(file);
    }
};

/* ▼ 保存（アイコン圧縮つき） ▼ */
document.getElementById("saveBtn").onclick = async () => {
    const name = document.getElementById("nameInput").value.trim();
    const group = document.getElementById("groupInput").value.trim();
    const pref = document.getElementById("prefInput").value.trim();
    const bio = document.getElementById("bioInput").value.trim();

    let iconUrl = null;

    const file = document.getElementById("iconInput").files[0];
    if (file) {
        const compressed = await compressImage(file, 400); // 400px に圧縮
        const path = `icons/${currentUser}.jpg`;
        await storage.ref(path).put(compressed);
        iconUrl = await storage.ref(path).getDownloadURL();
    }

    await db.collection("users").doc(currentUser).set({
        name,
        group,
        pref,
        bio,
        ...(iconUrl && { iconUrl })
    }, { merge: true });

    alert("変更が完了しました！");
};
</script>
