<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoutNet プロフィール</title>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 40px;
            text-align: center;
            color: #4E342E;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid #D7C4A3;
            width: 85%;
            max-width: 500px;
            margin: 30px auto;
            box-shadow: 0 4px 0 #D7C4A3;
            text-align: left;
        }

        h2 {
            color: #2E7D32;
            font-weight: 700;
            text-align: center;
        }

        input, textarea {
            width: 95%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #D7C4A3;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 3px 0 #1B5E20;
            cursor: pointer;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            background: #ddd;
            display: block;
            margin: 0 auto 10px;
        }
    </style>
</head>
<body>

    <h2>ScoutNet プロフィール</h2>

    <div class="box">
        <h3>ユーザー情報</h3>

        <!-- プロフィール画像 -->
        <img id="profile-img" class="profile-img" src="" alt="プロフィール画像">
        <input type="file" id="img-input" accept="image/*">

        <!-- 名前 -->
        <label>名前</label>
        <input type="text" id="name-input" placeholder="名前を入力">

        <!-- 自己紹介 -->
        <label>自己紹介</label>
        <textarea id="bio-input" rows="4" placeholder="自己紹介を入力"></textarea>

        <button onclick="saveProfile()">保存する</button>
    </div>

<script>
// 画像選択 → プレビュー表示 & 保存
document.getElementById("img-input").addEventListener("change", function(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const imgData = e.target.result;

        // プレビュー表示
        document.getElementById("profile-img").src = imgData;

        // 保存
        localStorage.setItem("profileImage", imgData);
    };
    reader.readAsDataURL(file);
});

// 保存ボタン → 名前・自己紹介を保存
function saveProfile() {
    const name = document.getElementById("name-input").value;
    const bio = document.getElementById("bio-input").value;

    localStorage.setItem("profileName", name);
    localStorage.setItem("profileBio", bio);

    alert("プロフィールを保存しました！");
}

// ページ読み込み時に保存された情報を表示
window.onload = function() {
    const savedImg = localStorage.getItem("profileImage");
    const savedName = localStorage.getItem("profileName");
    const savedBio = localStorage.getItem("profileBio");

    if (savedImg) document.getElementById("profile-img").src = savedImg;
    if (savedName) document.getElementById("name-input").value = savedName;
    if (savedBio) document.getElementById("bio-input").value = savedBio;
};
</script>

</body>
</html>
