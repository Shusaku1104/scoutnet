<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ScoutNet - プロフィール</title>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }

        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
            margin-left:15px;
        }

        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }

        .card {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:20px;
            box-shadow:0 4px 0 #D7C4A3;
        }

        .profile-img {
            width:130px;
            height:130px;
            border-radius:50%;
            object-fit:cover;
            background:#ddd;
            display:block;
            margin:0 auto 15px;
        }

        input, textarea {
            width:100%;
            padding:12px;
            border:1px solid #D7C4A3;
            border-radius:10px;
            margin-bottom:15px;
            font-size:16px;
        }

        .btn {
            width:100%;
            padding:14px;
            background:#2E7D32;
            color:white;
            border:none;
            border-radius:10px;
            font-weight:600;
            cursor:pointer;
            box-shadow:0 3px 0 #1B5E20;
            margin-top:10px;
        }

        @media (max-width:480px) {
            input, textarea { font-size:15px; }
        }
    </style>
</head>
<body>

<!-- ナビバー -->
<nav>
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div>
        <a href="home.html">ホーム</a>
        <a href="newpost.html">投稿する</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="container">
    <div class="card">

        <h2>プロフィール編集</h2>

        <img id="profileImg" class="profile-img" src="">

        <input type="file" id="imgInput" accept="image/*">

        <label>名前</label>
        <input type="text" id="nameInput">

        <label>自己紹介</label>
        <textarea id="bioInput" rows="4"></textarea>

        <button class="btn" id="saveBtn">保存する</button>

    </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
    apiKey: "AIzaSyDrvBB4R30sV_AhzzpJY9_d5x0biDp8uyA",
    authDomain: "scoutnet-3ccb1.firebaseapp.com",
    projectId: "scoutnet-3ccb1",
    storageBucket: "scoutnet-3ccb1.firebasestorage.app",
    messagingSenderId: "619869604171",
    appId: "1:619869604171:web:7ba88ab8eb9a0bff0ec0ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// ログインチェック
const currentUser = localStorage.getItem("currentUser");
if (!currentUser) location.href = "login.html";

const userRef = doc(db, "users", currentUser);

// 初期読み込み
const profileImg = document.getElementById("profileImg");
const nameInput = document.getElementById("nameInput");
const bioInput = document.getElementById("bioInput");
const imgInput = document.getElementById("imgInput");

let selectedImageFile = null;

(async () => {
    const snap = await getDoc(userRef);
    if (snap.exists()) {
        const data = snap.data();
        profileImg.src = data.icon || "";
        nameInput.value = data.name || "";
        bioInput.value = data.bio || "";
    }
})();

// アイコン選択 → プレビュー
imgInput.addEventListener("change", e => {
    selectedImageFile = e.target.files[0];
    if (!selectedImageFile) return;

    const reader = new FileReader();
    reader.onload = () => {
        profileImg.src = reader.result;
    };
    reader.readAsDataURL(selectedImageFile);
});

// 保存処理
document.getElementById("saveBtn").addEventListener("click", async () => {
    const name = nameInput.value.trim();
    const bio = bioInput.value.trim();

    let iconUrl = profileImg.src;

    // アイコンアップロード
    if (selectedImageFile) {
        const iconRef = ref(storage, `icons/${currentUser}.jpg`);
        await uploadBytes(iconRef, selectedImageFile);
        iconUrl = await getDownloadURL(iconRef);
    }

    await setDoc(userRef, {
        name,
        bio,
        icon: iconUrl
    }, { merge: true });

    alert("プロフィールを保存しました！");
});
</script>

</body>
</html>
