<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoutNet プロフィール</title>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 40px;
            text-align: center;
            color: #4E342E;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid #D7C4A3;
            width: 85%;
            max-width: 500px;
            margin: 30px auto;
            box-shadow: 0 4px 0 #D7C4A3;
            text-align: left;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            background: #ddd;
            display: block;
            margin: 0 auto 10px;
        }

        input, textarea {
            width: 95%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #D7C4A3;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 3px 0 #1B5E20;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>ScoutNet プロフィール</h2>

<div class="box">
    <h3>ユーザー情報</h3>

    <img id="profile-img" class="profile-img" src="" alt="プロフィール画像">
    <input type="file" id="img-input" accept="image/*">

    <label>名前</label>
    <input type="text" id="name-input">

    <label>自己紹介</label>
    <textarea id="bio-input" rows="4"></textarea>

    <button id="saveBtn">保存する</button>

    <!-- フォローボタン（他人のプロフィール時のみ表示） -->
    <button id="followBtn" style="display:none; margin-top:10px;">
        フォローする
    </button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>
// 🔥 GitHub に公開しても安全なダミー設定
// 本物のキーはローカルだけに置くこと
const firebaseConfig = {
    apiKey: "YOUR_FIREBASE_API_KEY",
    authDomain: "scoutnet-3ccb1.firebaseapp.com",
    projectId: "scoutnet-3ccb1",
    storageBucket: "scoutnet-3ccb1.firebasestorage.app",
    messagingSenderId: "619869604171",
    appId: "1:619869604171:web:7ba88ab8eb9a0bff0ec0ce"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();
const auth = firebase.auth();

let currentUser = null;
let viewUserId = null;
let isMyProfile = false;
let selectedImageFile = null;

const profileImg = document.getElementById("profile-img");
const imgInput = document.getElementById("img-input");
const nameInput = document.getElementById("name-input");
const bioInput = document.getElementById("bio-input");
const saveBtn = document.getElementById("saveBtn");
const followBtn = document.getElementById("followBtn");

// 🔥 ログインチェック & プロフィール対象決定
auth.onAuthStateChanged(async (user) => {
    if (!user) {
        location.href = "login.html";
        return;
    }
    currentUser = user;

    const params = new URLSearchParams(location.search);
    viewUserId = params.get("id") || currentUser.uid;
    isMyProfile = (viewUserId === currentUser.uid);

    const viewUserRef = db.collection("users").doc(viewUserId);
    const myRef = db.collection("users").doc(currentUser.uid);

    // 🔥 プロフィール読み込み
    viewUserRef.get().then(doc => {
        if (doc.exists) {
            const data = doc.data();
            if (data.iconUrl) profileImg.src = data.iconUrl;
            nameInput.value = data.name || "";
            bioInput.value = data.bio || "";
        } else {
            if (isMyProfile) {
                myRef.set({
                    name: currentUser.email,
                    bio: "",
                    iconUrl: "",
                    following: [],
                    followers: []
                }, { merge: true });
                nameInput.value = currentUser.email;
            }
        }
    });

    // 🔥 自分のプロフィールかどうかで UI 切り替え
    if (!isMyProfile) {
        saveBtn.style.display = "none";
        imgInput.style.display = "none";
        nameInput.disabled = true;
        bioInput.disabled = true;

        followBtn.style.display = "block";

        viewUserRef.onSnapshot(doc => {
            const data = doc.data() || {};
            const followers = data.followers || [];
            followBtn.textContent =
                followers.includes(currentUser.uid) ? "フォロー解除" : "フォローする";
        });

        followBtn.addEventListener("click", async () => {
            const userDoc = await viewUserRef.get();
            const userData = userDoc.data() || {};
            let followers = userData.followers || [];

            const myDoc = await myRef.get();
            const myData = myDoc.data() || {};
            let following = myData.following || [];

            if (followers.includes(currentUser.uid)) {
                followers = followers.filter(id => id !== currentUser.uid);
                following = following.filter(id => id !== viewUserId);
            } else {
                followers.push(currentUser.uid);
                following.push(viewUserId);
                await sendNotification(viewUserId, "follow", null);
            }

            await viewUserRef.update({ followers });
            await myRef.set({ following }, { merge: true });
        });
    }

    // 🔥 保存ボタン
    saveBtn.addEventListener("click", async () => {
        const name = nameInput.value.trim();
        const bio = bioInput.value.trim();

        let iconUrl = profileImg.src || "";

        if (selectedImageFile) {
            const ref = storage.ref("icons/" + currentUser.uid + ".jpg");
            await ref.put(selectedImageFile);
            iconUrl = await ref.getDownloadURL();
        }

        await myRef.set({ name, bio, iconUrl }, { merge: true });

        alert("プロフィールを保存しました！");
    });
});

// 🔥 画像選択 → プレビュー
imgInput.addEventListener("change", (e) => {
    selectedImageFile = e.target.files[0];
    if (!selectedImageFile) return;

    const reader = new FileReader();
    reader.onload = () => {
        profileImg.src = reader.result;
    };
    reader.readAsDataURL(selectedImageFile);
});

// 🔥 通知送信
async function sendNotification(toUserId, type, postId) {
    await db.collection("notifications").add({
        userId: toUserId,
        type,
        postId,
        fromUserId: currentUser.uid,
        fromUserName: currentUser.email,
        createdAt: new Date()
    });
}
</script>

</body>
</html>
