<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - プロフィール</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }

        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
            margin-left:15px;
        }

        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }

        .profile-card {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:20px;
            box-shadow:0 4px 0 #D7C4A3;
            position: relative;   /* ← 追加 */
            z-index: 200;         /* ← 追加 */
        }

        .icon {
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
            display:block;
            margin:0 auto 15px;
            background:#ddd;
        }

        .label {
            font-weight:700;
            margin-top:10px;
        }

        .value {
            margin-bottom:10px;
        }

        .edit-input {
            width:100%;
            padding:10px;
            border:1px solid #D7C4A3;
            border-radius:10px;
            margin-bottom:10px;
        }

        .btn {
            width:100%;
            padding:14px;
            background:#2E7D32;
            color:white;
            border:none;
            border-radius:10px;
            font-weight:600;
            cursor:pointer;
            box-shadow:0 3px 0 #1B5E20;
            margin-top:10px;
        }

        .cancel-btn {
            background:#888;
            box-shadow:0 3px 0 #555;
        }
    </style>
</head>
<body>

<nav>
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div>
        <a href="home.html">ホーム</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="container">
    <div class="profile-card">

        <!-- プロフィール画像 -->
        <img id="icon" class="icon">

        <!-- 編集モード用 -->
        <input type="file" id="iconInput" style="display:none;">

        <div id="profileView">
            <div class="label">名前</div>
            <div class="value" id="name"></div>

            <div class="label">メール</div>
            <div class="value" id="email"></div>

            <div class="label">所属</div>
            <div class="value" id="team"></div>

            <div class="label">自己紹介</div>
            <div class="value" id="bio"></div>

            <div class="label">投稿数</div>
            <div class="value" id="postCount"></div>

            <div class="label">いいねした投稿</div>
            <div class="value" id="likeCount"></div>

            <button class="btn" id="editBtn">編集する</button>
        </div>

        <!-- 編集モード -->
        <div id="profileEdit" style="display:none;">
            <button class="btn" onclick="document.getElementById('iconInput').click()">画像を変更</button>

            <input id="editName" class="edit-input" placeholder="名前">
            <input id="editPref" class="edit-input" placeholder="都道府県">
            <input id="editTroop" class="edit-input" placeholder="団名">
            <textarea id="editBio" class="edit-input" placeholder="自己紹介"></textarea>

            <button class="btn" id="saveBtn">保存</button>
            <button class="btn cancel-btn" id="cancelBtn">キャンセル</button>
        </div>

    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
    getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import {
    getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
    apiKey: "AIzaSyDrvBB4R30sV_AhzzpJY9_d5x0biDp8uyA",
    authDomain: "scoutnet-3ccb1.firebaseapp.com",
    projectId: "scoutnet-3ccb1",
    storageBucket: "scoutnet-3ccb1.appspot.com",
    messagingSenderId: "619869604171",
    appId: "1:619869604171:web:7ba88ab8eb9a0bff0ec0ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const currentUser = localStorage.getItem("currentUser");
if (!currentUser) location.href = "login.html";

const userRef = doc(db, "users", currentUser);
const userSnap = await getDoc(userRef);

let userData = userSnap.data();

// デフォルトアイコン
const defaultIcon = "https://upload.wikimedia.org/wikipedia/commons/9/99/Sample_User_Icon.png";

// 表示モードに反映
document.getElementById("icon").src = userData.iconURL || defaultIcon;
document.getElementById("name").textContent = userData.name;
document.getElementById("email").textContent = userData.email;
document.getElementById("team").textContent = `${userData.prefecture} ${userData.troop}`;
document.getElementById("bio").textContent = userData.bio || "（未設定）";

// 投稿数
const postsQ = query(collection(db, "posts"), where("createdBy", "==", currentUser));
const postsSnap = await getDocs(postsQ);
document.getElementById("postCount").textContent = postsSnap.size;

// いいね数
const likesQ = query(collection(db, "likes"), where("user", "==", currentUser));
const likesSnap = await getDocs(likesQ);
document.getElementById("likeCount").textContent = likesSnap.size;

// 編集ボタン
document.getElementById("editBtn").addEventListener("click", () => {
    document.getElementById("profileView").style.display = "none";
    document.getElementById("profileEdit").style.display = "block";

    document.getElementById("editName").value = userData.name;
    document.getElementById("editPref").value = userData.prefecture;
    document.getElementById("editTroop").value = userData.troop;
    document.getElementById("editBio").value = userData.bio || "";
});

// キャンセル
document.getElementById("cancelBtn").addEventListener("click", () => {
    document.getElementById("profileView").style.display = "block";
    document.getElementById("profileEdit").style.display = "none";
});

// 保存
document.getElementById("saveBtn").addEventListener("click", async () => {
    const newName = document.getElementById("editName").value;
    const newPref = document.getElementById("editPref").value;
    const newTroop = document.getElementById("editTroop").value;
    const newBio = document.getElementById("editBio").value;

    let newIconURL = userData.iconURL;

    // アイコン変更
    const file = document.getElementById("iconInput").files[0];
    if (file) {
        const iconRef = ref(storage, `icons/${currentUser}.jpg`);
        await uploadBytes(iconRef, file);
        newIconURL = await getDownloadURL(iconRef);
    }

    await updateDoc(userRef, {
        name: newName,
        prefecture: newPref,
        troop: newTroop,
        bio: newBio,
        iconURL: newIconURL
    });

    alert("プロフィールを更新しました");
    location.reload();
});
</script>

</body>
</html>
