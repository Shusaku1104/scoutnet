<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - プロフィール</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Firebase 8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }

        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
            margin-left:15px;
        }

        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }

        .card {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:20px;
            box-shadow:0 4px 0 #D7C4A3;
        }

        .label {
            font-weight:700;
            margin-top:15px;
        }

        .input {
            width:100%;
            padding:10px;
            border:1px solid #D7C4A3;
            border-radius:8px;
            margin-top:5px;
        }

        .icon-preview {
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
            background:#ddd;
            margin-top:10px;
        }

        .save-btn {
            width:100%;
            padding:14px;
            background:#2E7D32;
            color:white;
            border:none;
            border-radius:10px;
            font-weight:700;
            cursor:pointer;
            margin-top:20px;
            box-shadow:0 3px 0 #1B5E20;
        }
    </style>
</head>
<body>

<nav>
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div style="display:flex; align-items:center; gap:15px;">
        <a href="home.html">ホーム</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h2>プロフィール編集</h2>

        <div class="label">アイコン</div>
        <img id="iconPreview" class="icon-preview">
        <input type="file" id="iconInput" accept="image/*" class="input">

        <div class="label">名前</div>
        <input id="nameInput" class="input">

        <div class="label">所属団</div>
        <input id="groupInput" class="input">

        <div class="label">県</div>
        <input id="prefInput" class="input">

        <div class="label">自己紹介</div>
        <textarea id="bioInput" class="input" rows="4"></textarea>

        <button id="saveBtn" class="save-btn">保存する</button>
    </div>
</div>

<script>
/* Firebase 設定 */
const firebaseConfig = {
  apiKey: "AIzaSyD121KvHW6Dtda16wFLOQ4IGOManS_bPl4",
  authDomain: "scoutnet12.firebaseapp.com",
  projectId: "scoutnet12",
  storageBucket: "scoutnet12.firebasestorage.app",
  messagingSenderId: "572737738511",
  appId: "1:572737738511:web:36a6a477c7ec6b8db7507a"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let currentUser = null;

/* ログイン確認 */
auth.onAuthStateChanged(async (user) => {
    if (!user) {
        location.href = "login.html";
        return;
    }

    currentUser = user.uid;

    const ref = db.collection("users").doc(user.uid);
    const snap = await ref.get();

    if (snap.exists) {
        const data = snap.data();

        document.getElementById("nameInput").value = data.name || "";
        document.getElementById("groupInput").value = data.group || "";
        document.getElementById("prefInput").value = data.pref || "";
        document.getElementById("bioInput").value = data.bio || "";

        if (data.iconUrl) {
            document.getElementById("iconPreview").src = data.iconUrl;
        }
    }
});

/* アイコンプレビュー */
document.getElementById("iconInput").onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
        document.getElementById("iconPreview").src = URL.createObjectURL(file);
    }
};

/* 保存 */
document.getElementById("saveBtn").onclick = async () => {
    const name = document.getElementById("nameInput").value.trim();
    const group = document.getElementById("groupInput").value.trim();
    const pref = document.getElementById("prefInput").value.trim();
    const bio = document.getElementById("bioInput").value.trim();

    let iconUrl = null;

    const file = document.getElementById("iconInput").files[0];
    if (file) {
        const path = `icons/${currentUser}.jpg`;
        await storage.ref(path).put(file);
        iconUrl = await storage.ref(path).getDownloadURL();
    }

    await db.collection("users").doc(currentUser).update({
        name,
        group,
        pref,
        bio,
        ...(iconUrl && { iconUrl })
    });

    alert("保存しました！");
};
</script>

</body>
</html>
