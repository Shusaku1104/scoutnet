<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - 投稿編集</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0 0 80px;
            color:#4E342E;
        }

        /* 上ナビバー */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 200;
            background: white;
            padding: 14px 18px;
            border-bottom: 2px solid #D7C4A3;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .top-nav img { height: 28px; }
        .top-nav-title {
            font-size: 20px;
            font-weight: 700;
        }

        .card {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:20px;
            margin:20px auto;
            max-width:600px;
            box-shadow:0 4px 0 #D7C4A3;
        }

        .input {
            width:100%;
            padding:12px;
            border:1px solid #D7C4A3;
            border-radius:10px;
            margin-bottom:16px;
            font-size:16px;
        }

        .submit-btn {
            width:100%;
            padding:14px;
            background:#2E7D32;
            color:white;
            border:none;
            border-radius:10px;
            font-size:17px;
            font-weight:700;
            cursor:pointer;
            box-shadow:0 3px 0 #1B5E20;
            transition:0.1s;
        }
        .submit-btn:active {
            transform:scale(0.97);
        }

        /* 画像プレビュー */
        .image-list {
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        .image-item {
            background:white;
            border:1px solid #D7C4A3;
            border-radius:12px;
            padding:10px;
            display:flex;
            gap:10px;
            align-items:center;
            cursor:grab;
        }

        .image-item.dragging {
            opacity:0.4;
        }

        .preview-img {
            width:90px;
            height:90px;
            object-fit:cover;
            border-radius:10px;
        }

        .remove-btn {
            background:#c62828;
            color:white;
            padding:8px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            transition:0.1s;
        }
        .remove-btn:active {
            transform:scale(0.97);
        }

        /* 下タブ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: white;
            border-top: 2px solid #D7C4A3;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -3px 0 #D7C4A3;
            z-index: 999;
        }
        .bottom-nav a {
            text-decoration: none;
            color: #4E342E;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }
        .bottom-nav img {
            width: 26px;
            height: 26px;
        }
    </style>
</head>

<body>

<!-- 上ナビバー -->
<div class="top-nav">
    <img src="icons/logo.png">
    <div class="top-nav-title">投稿編集</div>
</div>

<div class="card">
    <h2>投稿を編集</h2>

    <label>タイトル</label>
    <input type="text" id="title" class="input">

    <label>説明</label>
    <textarea id="description" class="input" rows="4"></textarea>

    <label>カテゴリ</label>
    <select id="category" class="input">
        <option value="アウトドア">⛺ アウトドア</option>
        <option value="インドア">🏠 インドア</option>
        <option value="奉仕">🤝 奉仕</option>
        <option value="その他">📦 その他</option>
    </select>

    <h3>📷 現在の画像（ドラッグで並び替え）</h3>
    <div id="imageList" class="image-list"></div>

    <h3>📤 新しい画像を追加</h3>
    <input type="file" id="newImages" accept="image/*" multiple class="input">

    <button id="submit" class="submit-btn">更新する</button>
</div>

<!-- 下タブ -->
<div class="bottom-nav">
    <a href="home.html">
        <img src="icons/home.png"><br>ホーム
    </a>
    <a href="newpost.html">
        <img src="icons/add.png"><br>投稿
    </a>
    <a href="profile.html">
        <img src="icons/user.png"><br>プロフィール
    </a>
</div>

<script>
/* ポップアップ */
function showPopup(message) {
    const msg = document.createElement("div");
    msg.style.position = "fixed";
    msg.style.top = "50%";
    msg.style.left = "50%";
    msg.style.transform = "translate(-50%, -50%)";
    msg.style.background = "white";
    msg.style.padding = "20px 30px";
    msg.style.borderRadius = "12px";
    msg.style.boxShadow = "0 4px 10px rgba(0,0,0,0.2)";
    msg.style.fontSize = "20px";
    msg.style.fontWeight = "700";
    msg.style.color = "#2E7D32";
    msg.style.zIndex = "9999";
    msg.innerText = message;

    document.body.appendChild(msg);
    setTimeout(() => msg.remove(), 1500);
}

/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyD121KvHW6Dtda16wFLOQ4IGOManS_bPl4",
  authDomain: "scoutnet12.firebaseapp.com",
  projectId: "scoutnet12",
  storageBucket: "scoutnet12.firebasestorage.app",
  messagingSenderId: "572737738511",
  appId: "1:572737738511:web:36a6a477c7ec6b8db7507a"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

/* 投稿ID */
const params = new URLSearchParams(location.search);
const postId = params.get("id");
const postRef = db.collection("posts").doc(postId);

let currentUser = null;
let images = []; // 並び替え後の画像
let thumbs = []; // サムネイル

/* ログイン確認 */
auth.onAuthStateChanged(async (user) => {
    if (!user) {
        location.href = "login.html";
        return;
    }
    currentUser = user.uid;
    loadPost();
});

/* 投稿読み込み */
async function loadPost() {
    const snap = await postRef.get();
    if (!snap.exists) {
        showPopup("投稿が見つかりません");
        return;
    }

    const post = snap.data();

    if (post.createdBy !== currentUser) {
        showPopup("編集権限がありません");
        return;
    }

    document.getElementById("title").value = post.title;
    document.getElementById("description").value = post.description;
    document.getElementById("category").value = post.category;

    images = post.images || [];
    thumbs = post.thumbs || [];

    renderImages();
}

/* 画像リスト描画 */
function renderImages() {
    const list = document.getElementById("imageList");
    list.innerHTML = "";

    images.forEach((url, index) => {
        const item = document.createElement("div");
        item.className = "image-item";
        item.draggable = true;
        item.dataset.index = index;

        const img = document.createElement("img");
        img.src = url;
        img.className = "preview-img";

        const btn = document.createElement("button");
        btn.className = "remove-btn";
        btn.textContent = "削除";
        btn.onclick = () => {
            images.splice(index, 1);
            thumbs.splice(index, 1);
            renderImages();
        };

        item.appendChild(img);
        item.appendChild(btn);
        list.appendChild(item);

        /* ドラッグ処理 */
        item.addEventListener("dragstart", () => {
            item.classList.add("dragging");
        });
        item.addEventListener("dragend", () => {
            item.classList.remove("dragging");
            updateOrder();
        });
    });

    /* ドラッグ位置判定 */
    list.addEventListener("dragover", (e) => {
        e.preventDefault();
        const dragging = document.querySelector(".dragging");
        const after = getDragAfterElement(list, e.clientY);
        if (after == null) {
            list.appendChild(dragging);
        } else {
            list.insertBefore(dragging, after);
        }
    });
}

/* ドラッグ後の順番更新 */
function updateOrder() {
    const items = [...document.querySelectorAll(".image-item")];
    const newImages = [];
    const newThumbs = [];

    items.forEach(item => {
        const index = item.dataset.index;
        newImages.push(images[index]);
        newThumbs.push(thumbs[index]);
    });

    images = newImages;
    thumbs = newThumbs;
}

/* ドラッグ位置取得 */
function getDragAfterElement(container, y) {
    const items = [...container.querySelectorAll(".image-item:not(.dragging)")];

    return items.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;

        if (offset < 0 && offset > closest.offset) {
            return { offset, element: child };
        } else {
            return closest;
        }
    }, { offset: Number.NEGATIVE_INFINITY }).element;
}

/* サムネイル生成（軽量版） */
function createThumbnail(file) {
    return new Promise((resolve) => {
        const img = new Image();
        const reader = new FileReader();

        reader.onload = (e) => {
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);

        img.onload = () => {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            const maxSize = 300;
            let w = img.width;
            let h = img.height;

            if (w > h) {
                if (w > maxSize) {
                    h *= maxSize / w;
                    w = maxSize;
                }
            } else {
                if (h > maxSize) {
                    w *= maxSize / h;
                    h = maxSize;
                }
            }

            canvas.width = w;
            canvas.height = h;
            ctx.drawImage(img, 0, 0, w, h);

            resolve(canvas.toDataURL("image/jpeg", 0.7));
        };
    });
}

/* 更新処理 */
document.getElementById("submit").onclick = async () => {
    const title = document.getElementById("title").value.trim();
    const description = document.getElementById("description").value.trim();
    const category = document.getElementById("category").value;

    if (!title || !description) {
        showPopup("タイトルと説明は必須です");
        return;
    }

    const btn = document.getElementById("submit");
    btn.disabled = true;
    btn.textContent = "更新中…";

    /* 新規画像アップロード */
    const newFiles = document.getElementById("newImages").files;
    const newImageUrls = [];
    const newThumbUrls = [];

    for (let file of newFiles) {
        const ref = storage.ref("posts/" + Date.now() + "_" + file.name);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        newImageUrls.push(url);

        const thumbData = await createThumbnail(file);
        const thumbRef = storage.ref("thumbs/" + Date.now() + "_thumb_" + file.name);
        await thumbRef.putString(thumbData, "data_url");
        const thumbUrl = await thumbRef.getDownloadURL();
        newThumbUrls.push(thumbUrl);
    }

    /* Firestore 更新 */
    await postRef.update({
        title,
        description,
        category,
        images: [...images, ...newImageUrls],
        thumbs: [...thumbs, ...newThumbUrls]
    });

    showPopup("更新が完了しました！");

    setTimeout(() => {
        location.href = "post.html?id=" + postId;
    }, 1500);
};
</script>

</body>
</html>
