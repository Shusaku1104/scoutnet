<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - 投稿編集</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Firebase 8系 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        html { font-size: clamp(14px, 2.5vw, 18px); }

        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
            color: #4E342E;
        }

        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:#ffffff;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
            font-size: 0.9rem;
        }

        .card {
            background: #FFFFFF;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid #D7C4A3;
            margin: 20px auto;
            max-width: 600px;
            box-shadow: 0 4px 0 #D7C4A3;
        }

        .input {
            width: 100%;
            padding: 12px;
            border: 1px solid #D7C4A3;
            border-radius: 10px;
            font-size: 1rem;
            background: #fff;
            margin-bottom: 16px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 3px 0 #1B5E20;
        }

        .preview-img {
            width: 100%;
            border-radius: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<nav>
    <div style="font-size:1.3rem; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div style="display:flex; gap:18px; font-weight:600;">
        <a href="home.html">ホーム</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="card">
    <h2 style="font-size:1.4rem;">投稿を編集</h2>

    <label>タイトル</label>
    <input type="text" id="title" class="input">

    <label>説明</label>
    <textarea id="description" class="input" rows="4"></textarea>

    <label>カテゴリ</label>
    <select id="category" class="input">
        <option value="アウトドア">⛺ アウトドア</option>
        <option value="インドア">🏠 インドア</option>
        <option value="奉仕">🤝 奉仕</option>
    </select>

    <label>画像を変更（任意）</label>
    <input type="file" id="imageInput" accept="image/*" class="input">

    <img id="preview" class="preview-img" style="display:none;">

    <button id="submit" class="submit-btn">更新する</button>
</div>

<script>
/* Firebase 設定（ScoutNet12 の値に差し替え） */
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "scoutnet12.firebaseapp.com",
    projectId: "scoutnet12",
    storageBucket: "scoutnet12.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

const params = new URLSearchParams(location.search);
const postId = params.get("id");

const currentUser = localStorage.getItem("currentUser");
if (!currentUser) location.href = "login.html";

let originalImages = [];

/* 投稿読み込み */
db.collection("posts").doc(postId).get().then(doc => {
    if (!doc.exists) {
        alert("投稿が見つかりません");
        location.href = "home.html";
        return;
    }

    const post = doc.data();

    /* 投稿者チェック */
    if (post.createdBy !== currentUser) {
        alert("この投稿を編集する権限がありません");
        location.href = "home.html";
        return;
    }

    document.getElementById("title").value = post.title;
    document.getElementById("description").value = post.description;
    document.getElementById("category").value = post.category;

    originalImages = post.images || [];

    if (originalImages.length > 0) {
        const preview = document.getElementById("preview");
        preview.src = originalImages[0];
        preview.style.display = "block";
    }
});

/* 画像プレビュー */
document.getElementById("imageInput").addEventListener("change", function() {
    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = () => {
        const preview = document.getElementById("preview");
        preview.src = reader.result;
        preview.style.display = "block";
    };
    reader.readAsDataURL(file);
});

/* 更新処理 */
document.getElementById("submit").onclick = async () => {
    const title = document.getElementById("title").value.trim();
    const description = document.getElementById("description").value.trim();
    const category = document.getElementById("category").value;

    if (!title || !description) {
        alert("タイトルと説明は必須です");
        return;
    }

    let imageUrls = originalImages;

    const file = document.getElementById("imageInput").files[0];
    if (file) {
        const ref = storage.ref("posts/" + Date.now() + "_" + file.name);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        imageUrls = [url];
    }

    await db.collection("posts").doc(postId).update({
        title,
        description,
        category,
        images: imageUrls
    });

    alert("投稿を更新しました！");
    location.href = "post.html?id=" + postId;
};
</script>

</body>
</html>
