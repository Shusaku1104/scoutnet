<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - 新規登録</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }
        .container {
            max-width:400px;
            margin:60px auto;
            background:white;
            padding:25px;
            border-radius:16px;
            border:2px solid #D7C4A3;
            box-shadow:0 4px 0 #D7C4A3;
        }
        h2 {
            text-align:center;
            margin-bottom:20px;
        }
        input {
            width:100%;
            padding:12px;
            margin-bottom:12px;
            border:1px solid #D7C4A3;
            border-radius:10px;
        }
        .btn {
            width:100%;
            padding:14px;
            background:#2E7D32;
            color:white;
            border:none;
            border-radius:10px;
            font-weight:600;
            cursor:pointer;
            box-shadow:0 3px 0 #1B5E20;
            margin-top:10px;
        }
        .link {
            text-align:center;
            margin-top:15px;
        }
        .link a {
            color:#2E7D32;
            text-decoration:none;
            font-weight:600;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ScoutNet 新規登録</h2>

    <input type="text" id="userId" placeholder="ログインID">
    <input type="password" id="password" placeholder="パスワード">
    <input type="password" id="password2" placeholder="パスワード（確認）">

    <button class="btn" id="signupBtn">登録する</button>

    <div class="link">
        <a href="login.html">ログインはこちら</a>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAy1dzUvC_dWtnEOsPZ-L3rPkbhPwiwaOU",
  authDomain: "scoutnet2-80838.firebaseapp.com",
  projectId: "scoutnet2-80838",
  storageBucket: "scoutnet2-80838.firebasestorage.app",
  messagingSenderId: "847374706005",
  appId: "1:847374706005:web:6a0415a2a8b13ee76efbdc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("signupBtn").addEventListener("click", async () => {
    const id = document.getElementById("userId").value.trim();
    const pw = document.getElementById("password").value.trim();
    const pw2 = document.getElementById("password2").value.trim();

    if (!id || !pw || !pw2) {
        alert("すべての項目を入力してください");
        return;
    }

    if (pw !== pw2) {
        alert("パスワードが一致していません");
        return;
    }

    const ref = doc(db, "users", id);
    const snap = await getDoc(ref);

    if (snap.exists()) {
        alert("このログインIDはすでに使われています");
        return;
    }

    await setDoc(ref, {
        password: pw,
        name: id,
        bio: "",
        icon: "",
        createdAt: Date.now()
    });

    localStorage.setItem("currentUser", id);
    alert("登録が完了しました！");
    location.href = "home.html";
});
</script>

</body>
</html>
