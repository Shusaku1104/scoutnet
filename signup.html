<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - 新規登録</title>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }

        .container {
            max-width:400px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:16px;
            border:2px solid #D7C4A3;
            box-shadow:0 4px 0 #D7C4A3;
        }

        h2 {
            text-align:center;
            color:#2E7D32;
            margin-bottom:20px;
        }

        .input {
            width:100%;
            padding:12px;
            border:1px solid #D7C4A3;
            border-radius:10px;
            margin-bottom:16px;
        }

        .btn {
            width:100%;
            padding:14px;
            background:#2E7D32;
            color:white;
            border:none;
            border-radius:10px;
            font-weight:600;
            cursor:pointer;
            box-shadow:0 3px 0 #1B5E20;
            margin-top:10px;
        }

        a {
            color:#2E7D32;
            text-decoration:none;
            font-weight:600;
            display:block;
            text-align:center;
            margin-top:10px;
        }

        .terms {
            font-size:13px;
            text-align:center;
            margin-top:10px;
            color:#4E342E;
        }

        .terms a {
            color:#2E7D32;
            text-decoration:underline;
        }

        .error {
            color:red;
            text-align:center;
            margin-bottom:10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🏕 ScoutNet</h2>

    <div id="error" class="error"></div>

    <input type="text" id="userId" class="input" placeholder="ログインID（半角英数字8文字以上）">
    <input type="password" id="password" class="input" placeholder="パスワード（半角英数字8文字以上）">
    <input type="password" id="password2" class="input" placeholder="パスワード確認">

    <div class="terms">
        アカウントを作成することで、<br>
        <a href="rules.html">利用規約</a> に同意したものとみなします。
    </div>

    <button class="btn" id="signupBtn">登録する</button>

    <a href="login.html">ログインはこちら</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDrvBB4R30sV_AhzzpJY9_d5x0biDp8uyA",
    authDomain: "scoutnet-3ccb1.firebaseapp.com",
    projectId: "scoutnet-3ccb1",
    storageBucket: "scoutnet-3ccb1.appspot.com",  // ← 修正済み
    messagingSenderId: "619869604171",
    appId: "1:619869604171:web:7ba88ab8eb9a0bff0ec0ce"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  document.getElementById("signupBtn").addEventListener("click", async () => {
    const id = document.getElementById("userId").value.trim();
    const pw = document.getElementById("password").value.trim();
    const pw2 = document.getElementById("password2").value.trim();
    const error = document.getElementById("error");

    error.textContent = "";

    const regex = /^[A-Za-z0-9]+$/;

    if (!regex.test(id) || id.length < 8) {
        error.textContent = "ログインIDは半角英数字8文字以上です";
        return;
    }

    if (!regex.test(pw) || pw.length < 8) {
        error.textContent = "パスワードは半角英数字8文字以上です";
        return;
    }

    if (pw !== pw2) {
        error.textContent = "パスワードが一致しません";
        return;
    }

    const ref = doc(db, "users", id);
    const snap = await getDoc(ref);

    if (snap.exists()) {
        error.textContent = "このログインIDはすでに使われています";
        return;
    }

    // 新規登録データ
    await setDoc(ref, {
      password: pw,
      name: id,     // 初期表示名
      bio: "",      // 自己紹介
      icon: "",     // アイコン
      createdAt: Date.now()
    });

    // 自動ログイン
    localStorage.setItem("currentUser", id);

    location.href = "home.html";
  });
</script>

</body>
</html>
