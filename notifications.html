<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ScoutNet - 通知</title>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }

        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
            margin-left:15px;
        }

        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }

        .notice {
            background:white;
            border:2px solid #D7C4A3;
            border-radius:16px;
            padding:16px;
            margin-bottom:15px;
            box-shadow:0 4px 0 #D7C4A3;
            cursor:pointer;
        }

        .time {
            font-size:12px;
            color:#6d6d6d;
            margin-top:5px;
        }
    </style>
</head>
<body>

<nav>
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div>
        <a href="home.html">ホーム</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
    </div>
</nav>

<div class="container">
    <h2>🔔 通知</h2>
    <div id="noticeList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDrvBB4R30sV_AhzzpJY9_d5x0biDp8uyA",
    authDomain: "scoutnet-3ccb1.firebaseapp.com",
    projectId: "scoutnet-3ccb1",
    storageBucket: "scoutnet-3ccb1.appspot.com",
    messagingSenderId: "619869604171",
    appId: "1:619869604171:web:7ba88ab8eb9a0bff0ec0ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const currentUser = localStorage.getItem("currentUser");
if (!currentUser) location.href = "login.html";

const noticeList = document.getElementById("noticeList");

const q = query(
    collection(db, "notifications"),
    where("to", "==", currentUser),
    orderBy("createdAt", "desc")
);

onSnapshot(q, (snapshot) => {
    noticeList.innerHTML = "";

    snapshot.forEach((docSnap) => {
        const n = docSnap.data();

        const div = document.createElement("div");
        div.className = "notice";

        let text = "";

        if (n.type === "newpost") {
            text = `📢 新しい投稿が追加されました`;
        } else if (n.type === "like") {
            text = `❤️ ${n.from} さんがあなたの投稿にいいねしました`;
        } else if (n.type === "comment") {
            text = `💬 ${n.from} さんがあなたの投稿にコメントしました`;
        }

        div.innerHTML = `
            <div>${text}</div>
            <div class="time">${new Date(n.createdAt).toLocaleString()}</div>
        `;

        div.addEventListener("click", () => {
            if (n.postId) {
                location.href = "post.html?id=" + n.postId;
            }
        });

        noticeList.appendChild(div);
    });
});
</script>

</body>
</html>
