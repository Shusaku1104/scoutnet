<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - 通知</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        /* 端末幅に応じてフォント自動調整 */
        html {
            font-size: clamp(14px, 2.5vw, 18px);
        }

        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
            color: #4E342E;
        }

        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:#ffffff;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
            font-size: 0.9rem;
        }

        .card {
            background: #FFFFFF;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid #D7C4A3;
            margin: 20px;
            box-shadow: 0 4px 0 #D7C4A3;
        }

        h2 {
            font-weight: 700;
            margin-bottom: 16px;
            color: #2E7D32;
            border-left: 6px solid #66BB6A;
            padding-left: 10px;
            font-size: 1.4rem;
        }

        .notification {
            background:#F1F8E9;
            padding:12px;
            border-radius:12px;
            border:1px solid #C5E1A5;
            margin-bottom:10px;
            cursor: pointer;
            font-size: 1rem;
        }

        /* スマホ向け最適化 */
        @media (max-width: 480px) {
            nav div:first-child {
                font-size: 1.2rem;
            }

            nav a {
                font-size: 0.8rem;
            }

            .card {
                margin: 12px;
                padding: 16px;
            }

            .notification {
                font-size: 0.95rem;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<nav>
    <div style="font-size:1.3rem; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div style="display:flex; gap:18px; font-weight:600;">
        <a href="index.html">ホーム</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="card">
    <h2>通知一覧</h2>
    <div id="notificationList"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>
// 🔥 GitHub に公開しても安全なダミー設定
const firebaseConfig = {
    apiKey: "YOUR_FIREBASE_API_KEY",
    authDomain: "scoutnet-3ccb1.firebaseapp.com",
    projectId: "scoutnet-3ccb1",
    storageBucket: "scoutnet-3ccb1.firebasestorage.app",
    messagingSenderId: "619869604171",
    appId: "1:619869604171:web:7ba88ab8eb9a0bff0ec0ce"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

const list = document.getElementById("notificationList");

let currentUser = null;

// 🔥 Firebase Auth でログインチェック
auth.onAuthStateChanged(user => {
    if (!user) {
        location.href = "login.html";
        return;
    }
    currentUser = user;

    loadNotifications();
});

// 🔥 通知読み込み
function loadNotifications() {
    db.collection("notifications")
      .where("userId", "==", currentUser.uid)
      .orderBy("createdAt", "desc")
      .onSnapshot(snapshot => {
          list.innerHTML = "";

          if (snapshot.empty) {
              list.innerHTML = "<p>通知はありません。</p>";
              return;
          }

          snapshot.forEach(doc => {
              const n = doc.data();
              const div = document.createElement("div");
              div.className = "notification";

              // 通知メッセージ
              let text = "";

              if (n.type === "like") {
                  text = `❤️ ${n.fromUserName} さんがあなたの投稿にいいねしました`;
              } else if (n.type === "comment") {
                  text = `💬 ${n.fromUserName} さんがあなたの投稿にコメントしました`;
              } else if (n.type === "follow") {
                  text = `👤 ${n.fromUserName} さんがあなたをフォローしました`;
              }

              div.textContent = text;

              // 投稿に関連する通知なら、クリックで投稿へ
              if (n.postId) {
                  div.addEventListener("click", () => {
                      location.href = "post.html?id=" + n.postId;
                  });
              }

              list.appendChild(div);
          });
      });
}
</script>

</body>
</html>
