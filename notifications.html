<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - 通知</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
            color: #4E342E;
        }

        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:#ffffff;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
        }

        .card {
            background: #FFFFFF;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid #D7C4A3;
            margin: 20px;
            box-shadow: 0 4px 0 #D7C4A3;
        }

        h2 {
            font-weight: 700;
            margin-bottom: 16px;
            color: #2E7D32;
            border-left: 6px solid #66BB6A;
            padding-left: 10px;
        }

        .notification {
            background:#F1F8E9;
            padding:12px;
            border-radius:12px;
            border:1px solid #C5E1A5;
            margin-bottom:10px;
        }
    </style>
</head>
<body>

<nav>
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div style="display:flex; gap:18px; font-size:15px; font-weight:600;">
        <a href="index.html">ホーム</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="card">
    <h2>通知一覧</h2>
    <div id="notificationList"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDrvBB4R30sV_AhzzpJY9_d5x0biDp8uyA",
    authDomain: "scoutnet-3ccb1.firebaseapp.com",
    projectId: "scoutnet-3ccb1",
    storageBucket: "scoutnet-3ccb1.firebasestorage.app",
    messagingSenderId: "619869604171",
    appId: "1:619869604171:web:7ba88ab8eb9a0bff0ec0ce"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const currentUser = JSON.parse(localStorage.getItem("currentUser"));
const list = document.getElementById("notificationList");

// Firestore から通知を読み込む
db.collection("notifications")
  .where("userId", "==", currentUser.id)
  .orderBy("createdAt", "desc")
  .onSnapshot(snapshot => {
      list.innerHTML = "";

      if (snapshot.empty) {
          list.innerHTML = "<p>通知はありません。</p>";
          return;
      }

      snapshot.forEach(doc => {
          const n = doc.data();
          const div = document.createElement("div");
          div.className = "notification";

          if (n.type === "like") {
              div.textContent = `❤️ ${n.fromUserName} さんがあなたの投稿にいいねしました`;
          } else if (n.type === "comment") {
              div.textContent = `💬 ${n.fromUserName} さんがあなたの投稿にコメントしました`;
          }

          list.appendChild(div);
      });
  });
</script>

</body>
</html>
