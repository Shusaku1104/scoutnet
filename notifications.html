<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - 通知</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Firebase v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0 0 80px;
            color:#4E342E;
        }

        /* 上ナビバー */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 200;
            background: white;
            padding: 14px 18px;
            border-bottom: 2px solid #D7C4A3;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .top-nav img {
            height: 28px;
        }
        .top-nav-title {
            font-size: 20px;
            font-weight: 700;
        }

        /* スライド式タブ */
        nav {
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:56px;
            z-index:150;
            padding:10px;
        }
        nav .tab-scroll {
            display:flex;
            overflow-x:auto;
            white-space:nowrap;
            gap:15px;
        }
        nav .tab-scroll::-webkit-scrollbar {
            display:none;
        }
        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
            padding:8px 4px;
            display:inline-block;
        }
        nav a.active {
            color:#2E7D32;
            border-bottom:3px solid #2E7D32;
        }

        /* 通知カード */
        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }
        h2 {
            text-align:center;
            margin-bottom:20px;
            color:#2E7D32;
        }
        #loading {
            text-align:center;
            margin-top:40px;
            font-size:18px;
            color:#777;
        }
        .notice-card {
            background:white;
            padding:15px;
            margin-bottom:12px;
            border-radius:16px;
            border:2px solid #D7C4A3;
            box-shadow:0 4px 0 #D7C4A3;
            cursor:pointer;
            transition:0.1s;
        }
        .notice-card:active {
            transform:scale(0.98);
            box-shadow:0 2px 0 #BCA68A;
        }
        .notice-row {
            display:flex;
            align-items:center;
        }
        .notice-icon {
            font-size:24px;
            margin-right:10px;
        }
        .notice-time {
            font-size:12px;
            color:#6d6d6d;
            margin-top:5px;
        }
        .empty {
            text-align:center;
            margin-top:40px;
            font-size:16px;
            color:#777;
        }

        /* 下タブ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: white;
            border-top: 2px solid #D7C4A3;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -3px 0 #D7C4A3;
            z-index: 999;
        }
        .bottom-nav a {
            text-decoration: none;
            color: #4E342E;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }
        .bottom-nav img {
            width: 26px;
            height: 26px;
        }
    </style>
</head>
<body>

<!-- 上ナビバー -->
<div class="top-nav">
    <img src="icons/logo.png">
    <div class="top-nav-title">ScoutNet</div>
</div>

<!-- スライド式タブ -->
<nav>
    <div class="tab-scroll">
        <a href="home.html">ホーム</a>
        <a href="about.html">このサイトについて</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html" class="active">🔔 通知</a>
    </div>
</nav>

<div class="container">
    <h2>通知一覧</h2>

    <div id="loading">読み込み中…</div>
    <div id="notifications"></div>
</div>

<!-- 下タブ -->
<div class="bottom-nav">
    <a href="home.html">
        <img src="icons/home.png"><br>ホーム
    </a>
    <a href="newpost.html">
        <img src="icons/add.png"><br>投稿
    </a>
    <a href="profile.html">
        <img src="icons/user.png"><br>プロフィール
    </a>
</div>

<script>
/* Firebase 設定 */
const firebaseConfig = {
  apiKey: "AIzaSyD121KvHW6Dtda16wFLOQ4IGOManS_bPl4",
  authDomain: "scoutnet12.firebaseapp.com",
  projectId: "scoutnet12",
  storageBucket: "scoutnet12.firebasestorage.app",
  messagingSenderId: "572737738511",
  appId: "1:572737738511:web:36a6a477c7ec6b8db7507a"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* 時間を「○分前」に変換 */
function timeAgo(timestamp) {
    if (!timestamp) return "";
    const t = timestamp.toMillis ? timestamp.toMillis() : timestamp;
    const diff = Date.now() - t;

    const minutes = Math.floor(diff / 60000);
    if (minutes < 1) return "たった今";
    if (minutes < 60) return minutes + "分前";

    const hours = Math.floor(minutes / 60);
    if (hours < 24) return hours + "時間前";

    const days = Math.floor(hours / 24);
    return days + "日前";
}

/* 通知読み込み */
auth.onAuthStateChanged(async (user) => {
    if (!user) {
        location.href = "login.html";
        return;
    }

    db.collection("notifications")
        .where("to", "==", user.uid)
        .orderBy("createdAt", "desc")
        .onSnapshot(async (snapshot) => {

            const box = document.getElementById("notifications");
            const loading = document.getElementById("loading");

            loading.style.display = "none";
            box.innerHTML = "";

            if (snapshot.empty) {
                box.innerHTML = `
                    <p class="empty">
                        通知はまだありません<br>
                        <a href="home.html" style="color:#2E7D32; font-weight:700;">投稿を見に行く</a>
                    </p>`;
                return;
            }

            /* from のユーザーIDをまとめて取得 */
            const userIds = [...new Set(snapshot.docs.map(doc => doc.data().from))];

            const userSnaps = await Promise.all(
                userIds.map(uid => db.collection("users").doc(uid).get())
            );

            const userMap = {};
            userSnaps.forEach((snap, i) => {
                userMap[userIds[i]] = snap.exists ? snap.data().name : "不明なユーザー";
            });

            snapshot.docs.forEach(doc => {
                const data = doc.data();
                const fromName = userMap[data.from] || "不明なユーザー";

                let icon = "";
                let message = "";

                if (data.type === "like") {
                    icon = "❤️";
                    message = `${fromName} さんがあなたの投稿にいいねしました`;
                }

                if (data.type === "comment") {
                    icon = "💬";
                    message = `${fromName} さんがあなたの投稿にコメントしました`;
                }

                if (data.type === "newpost") {
                    icon = "🆕";
                    message = `${fromName} さんが新しい投稿を追加しました`;
                }

                const card = document.createElement("div");
                card.className = "notice-card";

                card.innerHTML = `
                    <div class="notice-row">
                        <div class="notice-icon">${icon}</div>
                        <div>${message}</div>
                    </div>
                    <div class="notice-time">${timeAgo(data.createdAt)}</div>
                `;

                /* 既読処理 */
                card.onclick = async () => {
                    if (data.postId) {
                        await doc.ref.update({ read: true });
                        location.href = `post.html?id=${data.postId}`;
                    }
                };

                box.appendChild(card);
            });
        });
});
</script>

</body>
</html>
