<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ScoutNet - 通知</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
            color:#4E342E;
        }

        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 20px;
            background:white;
            border-bottom:2px solid #D7C4A3;
            position:sticky;
            top:0;
            z-index:100;
        }

        nav div:last-child {
            display:flex;
            gap:15px;
            overflow-x:auto;
            white-space: nowrap;
        }

        nav a {
            color:#4E342E;
            text-decoration:none;
            font-weight:600;
        }

        .container {
            max-width:600px;
            margin:20px auto;
            padding:0 15px;
        }

        .notice-card {
            background:white;
            padding:15px;
            margin-bottom:12px;
            border-radius:10px;
            border:1px solid #D7C4A3;
            cursor:pointer;
        }

        .notice-row {
            display:flex;
            align-items:center;
        }

        .notice-icon {
            font-size:22px;
            margin-right:10px;
        }

        .notice-time {
            font-size:12px;
            color:#6d6d6d;
            margin-top:5px;
        }
    </style>
</head>
<body>

<nav>
    <div style="font-size:20px; font-weight:700; color:#2E7D32;">
        🏕 ScoutNet
    </div>

    <div>
        <a href="home.html">ホーム</a>
        <a href="about.html">このサイトについて</a>
        <a href="newpost.html">投稿する</a>
        <a href="profile.html">プロフィール</a>
        <a href="notifications.html">🔔 通知</a>
    </div>
</nav>

<div class="container">
    <h2>通知一覧</h2>
    <div id="notifications"></div>
</div>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
/* Firebase 設定 */
const firebaseConfig = {
  apiKey: "AIzaSyD121KvHW6Dtda16wFLOQ4IGOManS_bPl4",
  authDomain: "scoutnet12.firebaseapp.com",
  projectId: "scoutnet12",
  storageBucket: "scoutnet12.appspot.com",
  messagingSenderId: "572737738511",
  appId: "1:572737738511:web:36a6a477c7ec6b8db7507a"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* 時間を「○分前」に変換 */
function timeAgo(timestamp) {
    if (!timestamp) return "";
    const t = timestamp.toMillis ? timestamp.toMillis() : timestamp;
    const now = Date.now();
    const diff = now - t;

    const minutes = Math.floor(diff / 60000);
    if (minutes < 1) return "たった今";
    if (minutes < 60) return minutes + "分前";

    const hours = Math.floor(minutes / 60);
    if (hours < 24) return hours + "時間前";

    const days = Math.floor(hours / 24);
    return days + "日前";
}

/* 通知読み込み */
auth.onAuthStateChanged(async (user) => {
    if (!user) {
        alert("ログインしてください");
        location.href = "login.html";
        return;
    }

    db.collection("notifications")
        .where("to", "==", user.uid)
        .orderBy("createdAt", "desc")
        .onSnapshot(async (snapshot) => {

            const box = document.getElementById("notifications");
            box.innerHTML = "";

            for (const doc of snapshot.docs) {
                const data = doc.data();

                /* from のユーザー名取得 */
                const userSnap = await db.collection("users").doc(data.from).get();
                const fromName = userSnap.exists ? userSnap.data().name : "不明なユーザー";

                let icon = "";
                let message = "";

                /* いいね通知 */
                if (data.type === "like") {
                    icon = "❤️";
                    message = `${fromName} さんがあなたの投稿にいいねしました`;
                }

                /* コメント通知 */
                if (data.type === "comment") {
                    icon = "💬";
                    message = `${fromName} さんがあなたの投稿にコメントしました`;
                }

                /* 新規投稿通知（今回追加） */
                if (data.type === "newpost") {
                    icon = "🆕";
                    message = `${fromName} さんが新しい投稿を追加しました`;
                }

                const card = document.createElement("div");
                card.className = "notice-card";

                card.innerHTML = `
                    <div class="notice-row">
                        <div class="notice-icon">${icon}</div>
                        <div>${message}</div>
                    </div>
                    <div class="notice-time">${timeAgo(data.createdAt)}</div>
                `;

                card.onclick = () => {
                    if (data.postId) {
                        location.href = \`post.html?id=\${data.postId}\`;
                    }
                };

                box.appendChild(card);
            }
        });
});
</script>

</body>
</html>
